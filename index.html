<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0D0F14">
<title>flow-mind</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/icon.svg">
<style>
/* ── TOKENS ── */
:root {
  --bg:       #0D0F14;
  --surface:  #161A22;
  --surface2: #1E232E;
  --border:   rgba(255,255,255,0.08);
  --border2:  rgba(255,255,255,0.14);
  --gold:     #F5C842;
  --gold-dim: rgba(245,200,66,0.18);
  --blue:     #4A9EFF;
  --red:      #FF5F5F;
  --green:    #4AE09A;
  --text:     #E8EAF0;
  --text-dim: #6B7280;
  --text-mid: #9CA3AF;
  --r:        12px;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin:0; padding:0; }
html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;
  -webkit-font-smoothing:antialiased; }

/* ── CANVAS LAYER ── */
#graphCanvas {
  position:fixed; inset:0; width:100%; height:100%; touch-action:none; cursor:default;
}

/* ── HEADER ── */
header {
  position:fixed; top:0; left:0; right:0; z-index:20;
  display:flex; align-items:center; gap:10px; padding:calc(env(safe-area-inset-top)+10px) 14px 10px;
  background:linear-gradient(to bottom, rgba(13,15,20,0.96) 70%, transparent);
  pointer-events:none;
}
.app-title {
  font-size:15px; font-weight:800; color:var(--gold); letter-spacing:.05em;
  pointer-events:none;
}
.header-spacer { flex:1; }
header button { pointer-events:auto; }

.hdr-btn {
  background:rgba(255,255,255,0.06); border:1px solid var(--border2);
  border-radius:8px; color:var(--text); font-size:13px; font-weight:600;
  padding:6px 12px; cursor:pointer; display:flex; align-items:center; gap:5px;
  backdrop-filter:blur(8px); white-space:nowrap;
}
.hdr-btn:active { background:rgba(255,255,255,0.12); }
.hdr-btn.gold { border-color:rgba(245,200,66,0.4); color:var(--gold); }
.hdr-btn.gold:active { background:var(--gold-dim); }

/* ── SCORE BAR (上位ノーチE ── */
#scoreBar {
  position:fixed; top:calc(env(safe-area-inset-top)+52px); left:0; right:0; z-index:19;
  display:flex; gap:6px; padding:0 14px; overflow-x:auto; pointer-events:none;
  scrollbar-width:none;
}
#scoreBar::-webkit-scrollbar { display:none; }
.score-chip {
  flex-shrink:0; font-size:11px; font-weight:700; border-radius:100px;
  padding:4px 12px; border:1px solid; white-space:nowrap; pointer-events:none;
}

/* ── ATTRACTOR BAR (感情状態表示) ── */
#attractorBar {
  position:fixed; top:calc(env(safe-area-inset-top)+86px); left:0; right:0; z-index:19;
  display:flex; justify-content:center; pointer-events:none;
}
.attractor-chip {
  font-size:12px; font-weight:800; border-radius:100px; padding:6px 16px;
  border:1px solid; backdrop-filter:blur(10px); letter-spacing:.04em;
  display:none; align-items:center; gap:6px;
}
.attractor-chip.show { display:flex; }
.attractor-dot { width:7px; height:7px; border-radius:50%; }

/* ── TOOLBAR (下部) ── */
#toolbar {
  position:fixed; bottom:0; left:0; right:0; z-index:20;
  padding:10px 14px calc(env(safe-area-inset-bottom)+10px);
  background:linear-gradient(to top, rgba(13,15,20,0.97) 70%, transparent);
  display:flex; align-items:center; gap:8px;
}
.tool-btn {
  background:rgba(255,255,255,0.06); border:1px solid var(--border2);
  border-radius:10px; color:var(--text); font-size:13px; font-weight:600;
  padding:9px 14px; cursor:pointer; display:flex; align-items:center; gap:6px;
  backdrop-filter:blur(8px); white-space:nowrap; flex-shrink:0;
}
.tool-btn:active { background:rgba(255,255,255,0.12); }
.tool-btn.active { border-color:var(--gold); color:var(--gold); background:var(--gold-dim); }
.tool-btn.danger { border-color:rgba(255,95,95,0.4); color:var(--red); }
.tool-btn.danger:active { background:rgba(255,95,95,0.12); }
.tool-spacer { flex:1; }
#modeLabel {
  font-size:12px; color:var(--text-dim); pointer-events:none; text-align:center;
  position:absolute; bottom:calc(env(safe-area-inset-bottom)+54px); left:0; right:0;
}

/* ── NODE SHEET ── */
.sheet-overlay {
  position:fixed; inset:0; z-index:30; background:rgba(0,0,0,0.55);
  opacity:0; pointer-events:none; transition:opacity .2s;
}
.sheet-overlay.open { opacity:1; pointer-events:auto; }
.sheet {
  position:fixed; left:0; right:0; bottom:0; z-index:31;
  background:var(--surface); border-radius:20px 20px 0 0;
  border-top:1px solid var(--border2);
  max-height:85vh; display:flex; flex-direction:column;
  transform:translateY(100%); transition:transform .25s ease-out;
  box-shadow:0 -4px 40px rgba(0,0,0,0.6);
}
.sheet.open { transform:translateY(0); }
.sheet-handle { width:36px; height:4px; background:var(--border2); border-radius:2px; margin:10px auto 0; flex-shrink:0; }
.sheet-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 16px; border-bottom:1px solid var(--border); flex-shrink:0;
}
.sheet-header h2 { font-size:16px; font-weight:700; }
.sheet-header button { background:none; border:none; font-size:15px; color:var(--blue); padding:6px; cursor:pointer; font-weight:600; }
.sheet-body { overflow-y:auto; padding:16px 16px calc(env(safe-area-inset-bottom)+24px); }

.field-label { display:block; font-size:11px; color:var(--text-dim); font-weight:700;
  text-transform:uppercase; letter-spacing:.06em; margin:16px 0 6px; }
.field-label:first-child { margin-top:0; }

input[type=text], textarea {
  width:100%; font-size:16px; padding:10px 12px; border:1px solid var(--border2);
  border-radius:var(--r); background:var(--surface2); color:var(--text);
  font-family:inherit; -webkit-appearance:none;
}
input[type=text]:focus, textarea:focus { outline:2px solid var(--gold); border-color:var(--gold); }
textarea { min-height:70px; resize:vertical; line-height:1.5; }

/* 重みスライダー */
.weight-row { display:flex; align-items:center; gap:12px; margin-top:4px; }
.weight-row input[type=range] {
  flex:1; -webkit-appearance:none; height:4px; border-radius:2px;
  background:linear-gradient(to right, var(--gold) 0%, var(--gold) var(--pct,60%), var(--border2) var(--pct,60%));
  outline:none; cursor:pointer;
}
.weight-row input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:20px; height:20px; border-radius:50%;
  background:var(--gold); border:2px solid var(--bg);
  box-shadow:0 0 8px rgba(245,200,66,0.6);
}
.weight-val { font-size:18px; font-weight:800; color:var(--gold); min-width:24px; text-align:center; }

/* ノ�Eドカラー選抁E*/
.color-row { display:flex; gap:8px; margin-top:4px; }
.color-swatch {
  width:32px; height:32px; border-radius:50%; cursor:pointer;
  border:2px solid transparent; transition:transform .15s;
}
.color-swatch.active { border-color:#fff; transform:scale(1.15); }

/* AI刁E��結果 */
.ai-result-box {
  background:var(--surface2); border:1px solid var(--border2); border-radius:var(--r);
  padding:14px; font-size:14px; line-height:1.75; margin-top:12px;
  white-space:pre-wrap; display:none;
}
.ai-result-box.visible { display:block; }

/* 物琁E��インジケータ�E�ノードシート�E�E�E*/
.physics-box {
  background:var(--surface2); border:1px solid var(--border2); border-radius:var(--r);
  padding:12px 14px; margin-top:8px; font-size:12px; color:var(--text-mid); line-height:1.8;
}
.physics-box b { color:var(--text); }

/* ── GRAPH SELECTOR ── */
#graphListWrap { margin-bottom:14px; }
.graph-item {
  display:flex; align-items:center; justify-content:space-between;
  background:var(--surface2); border:1px solid var(--border); border-radius:var(--r);
  padding:12px 14px; margin-bottom:8px; cursor:pointer;
}
.graph-item:active { background:var(--border); }
.graph-item.current { border-color:var(--gold); }
.graph-item-name { font-size:15px; font-weight:600; }
.graph-item-meta { font-size:12px; color:var(--text-dim); margin-top:2px; }
.graph-item-del { background:none; border:none; color:var(--red); font-size:18px; padding:4px 8px; cursor:pointer; }

/* ── TOAST ── */
.toast {
  position:fixed; bottom:calc(env(safe-area-inset-bottom)+80px); left:50%;
  transform:translateX(-50%) translateY(12px);
  background:rgba(30,35,46,0.95); color:var(--text); border:1px solid var(--border2);
  border-radius:100px; padding:9px 20px; font-size:13px; font-weight:600;
  z-index:60; opacity:0; transition:opacity .2s, transform .2s;
  white-space:nowrap; pointer-events:none; backdrop-filter:blur(12px);
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ── AI LOADING ── */
#aiLoading {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  z-index:50; background:var(--surface); border:1px solid var(--border2);
  border-radius:16px; padding:20px 28px; font-size:14px; color:var(--text-mid);
  display:none; text-align:center; box-shadow:0 8px 40px rgba(0,0,0,0.6);
}
#aiLoading.show { display:block; }

/* ── EDGE DELETE HINT ── */
#edgeHint {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  background:var(--surface); border:1px solid var(--border2); border-radius:14px;
  padding:16px 20px; z-index:25; display:none; text-align:center;
  box-shadow:0 4px 30px rgba(0,0,0,0.5);
}
#edgeHint.show { display:block; }
#edgeHint p { font-size:14px; margin-bottom:12px; color:var(--text-mid); }
#edgeHint button { margin:0 4px; padding:8px 16px; border-radius:8px; border:1px solid var(--border2);
  font-size:14px; font-weight:600; cursor:pointer; }
#edgeDeleteBtn { background:rgba(255,95,95,0.15); color:var(--red); border-color:rgba(255,95,95,0.3); }
#edgeCancelBtn { background:var(--surface2); color:var(--text); }

/* ── QUICK CAPTURE (すぐ記録) ── */
#quickCaptureFab {
  position:fixed; right:16px; bottom:calc(env(safe-area-inset-bottom)+78px); z-index:22;
  width:58px; height:58px; border-radius:50%;
  background:linear-gradient(145deg, var(--gold), #E0A800);
  color:#1A1400; border:none; font-size:26px; font-weight:800;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 18px rgba(245,200,66,0.45);
  cursor:pointer;
}
#quickCaptureFab:active { transform:scale(0.94); }
#quickCaptureFab.recording {
  background:linear-gradient(145deg, var(--red), #C43A3A);
  box-shadow:0 4px 18px rgba(255,95,95,0.5);
  animation: qc-pulse 1.1s infinite;
}
@keyframes qc-pulse {
  0%,100% { box-shadow:0 4px 18px rgba(255,95,95,0.5); }
  50% { box-shadow:0 4px 30px rgba(255,95,95,0.85); }
}

#quickCaptureBar {
  position:fixed; left:12px; right:12px;
  bottom:calc(env(safe-area-inset-bottom)+10px); z-index:23;
  background:var(--surface); border:1px solid var(--border2);
  border-radius:18px; padding:12px 12px calc(env(safe-area-inset-bottom)+12px);
  box-shadow:0 -6px 30px rgba(0,0,0,0.55);
  transform:translateY(120%); transition:transform .22s ease-out;
}
#quickCaptureBar.open { transform:translateY(0); }
.qc-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.qc-title { font-size:12px; font-weight:800; color:var(--gold); letter-spacing:.04em; }
.qc-close { background:none; border:none; color:var(--text-dim); font-size:14px; padding:4px 6px; cursor:pointer; }
.qc-row { display:flex; align-items:flex-end; gap:8px; }
#qcInput {
  flex:1; min-height:44px; max-height:120px; resize:none;
  font-size:16px; padding:10px 12px; border:1px solid var(--border2);
  border-radius:12px; background:var(--surface2); color:var(--text);
  font-family:inherit; line-height:1.4;
}
#qcInput:focus { outline:2px solid var(--gold); border-color:var(--gold); }
.qc-mic-btn, .qc-send-btn {
  flex-shrink:0; width:44px; height:44px; border-radius:12px; border:1px solid var(--border2);
  background:var(--surface2); color:var(--text); font-size:18px;
  display:flex; align-items:center; justify-content:center; cursor:pointer;
}
.qc-mic-btn.recording { background:rgba(255,95,95,0.18); border-color:var(--red); color:var(--red); animation: qc-pulse 1.1s infinite; }
.qc-send-btn { background:var(--gold); border-color:var(--gold); color:#1A1400; font-weight:800; }
.qc-send-btn:active { background:#E0A800; }
.qc-status { font-size:12px; color:var(--text-dim); margin-top:6px; min-height:16px; }
.qc-status.busy { color:var(--gold); }

/* ── SYNC SHEET ── */
.sync-platform-box {
  border:1px solid var(--border2); border-radius:var(--r);
  padding:14px; margin-bottom:12px; background:var(--surface2);
}
.sync-platform-box h3 { font-size:13px; font-weight:800; color:var(--gold); margin-bottom:8px; }
.sync-platform-box p { font-size:12px; color:var(--text-mid); line-height:1.6; margin-bottom:10px; }
.sync-status-line { font-size:12px; color:var(--text-dim); margin-top:8px; }
.sync-btn-row { display:flex; gap:8px; flex-wrap:wrap; }
</style>
</head>

<!-- CANVAS -->
<canvas id="graphCanvas"></canvas>

<!-- HEADER -->

// ══════════════════════════════════╁E// 感情の物琁E��チE��  E定数�E�E階層�E�E// ══════════════════════════════════╁E// ① 電荷の減衰速度�E�時定数 ρE ms�E�Econst CHARGE_DECAY_TAU = 4000;

// ② 伝播効玁E��電流�E電場・磁場のアナロジー�E�エチE��のconductanceで増幁E��Econst PROPAGATION_FACTOR = 0.42;

// ④ attractor判定テーブル�E�帯埁EÁE寁E�� ÁE持続時閁EↁE感情ラベル�E�Efunction classifyAttractor(cluster) {
  const { band, density, durationMs, size } = cluster;

  }

  }

  return null;
}

// ══════════════════════════════════╁E// FLOWCHART LAYOUT  E常時、構造化された上�E下�Eレイアウトに整列させる
// ══════════════════════════════════╁E// エチE��の向き(from→to)を使って吁E��ード�E「階層(level)」を決め、E// 同じ階層のノ�Eド�E横に並べる。ルーチE循環)がある場合�E、そこだぁE// 未確定�Eまま残るので、最後にまとめて末尾の階層へ配置する、Efunction applyFlowchartLayout() {
  const g = currentGraph();
  if (!g) return;
  const ids = Object.keys(g.nodes);
  if (ids.length === 0) return;

  const inDeg = {};
  ids.forEach(id => { inDeg[id] = 0; });
  g.edges.forEach(e => { if (inDeg[e.to] !== undefined) inDeg[e.to]++; });

  const outAdj = {};
  ids.forEach(id => { outAdj[id] = []; });
  g.edges.forEach(e => { if (outAdj[e.from]) outAdj[e.from].push(e.to); });

  const level = {};
  const queue = [];
  ids.forEach(id => { if (inDeg[id] === 0) { level[id] = 0; queue.push(id); } });

  const inDegWork = Object.assign({}, inDeg);
  let qi = 0;
  while (qi < queue.length) {
    const cur = queue[qi++];
    outAdj[cur].forEach(nb => {
      level[nb] = Math.max(level[nb] !== undefined ? level[nb] : 0, level[cur] + 1);
      inDegWork[nb]--;
      if (inDegWork[nb] === 0 && level[nb] !== undefined && !queue.includes(nb)) queue.push(nb);
    });
  }

  // 循環などで未確定�Eまま残ったノード�E、最大階層の次にまとめて配置
  let maxLevel = 0;
  Object.values(level).forEach(l => { if (l > maxLevel) maxLevel = l; });
  ids.forEach(id => { if (level[id] === undefined) { maxLevel++; level[id] = maxLevel; } });

  // 階層ごとにグルーピングして横に並べめE  const byLevel = {};
  ids.forEach(id => {
    const l = level[id];
    (byLevel[l] = byLevel[l] || []).push(id);
  });

  const LEVEL_SPACING = 190; // 上下�E間隔
  const NODE_SPACING = 130;  // 同階層冁E�E左右間隔

  Object.keys(byLevel).map(Number).sort((a,b) => a-b).forEach(lvl => {
    const row = byLevel[lvl];
    row.forEach((id, i) => {
      const n = g.nodes[id];
      n.x = (i - (row.length - 1) / 2) * NODE_SPACING;
      n.y = lvl * LEVEL_SPACING;
    });
  });
}

// ══════════════════════════════════╁E// PAGE RANK  E重要度スコア計箁E// ══════════════════════════════════╁Efunction computeScores() {
  const g = currentGraph();
  if (!g) return {};
  const nids = Object.keys(g.nodes);
  if (nids.length === 0) return {};

  // 初期スコア = 自己重み
  const scores = {};
  nids.forEach(id => { scores[id] = g.nodes[id].weight || 3; });

  // 反復�E�E回！E  for (let iter = 0; iter < 3; iter++) {
    const next = {};
    nids.forEach(id => { next[id] = g.nodes[id].weight || 3; }); // 自己重みが�Eース
    g.edges.forEach(e => {
      const w = e.weight || 1;
      // toノ�Eド�Efromノ�Eド�Eスコアを受け取めE      if (next[e.to] !== undefined && scores[e.from] !== undefined) {
        next[e.to] += scores[e.from] * w * 0.4;
      }
    });
    Object.assign(scores, next);
  }

  // 正規化 [0..1]
  const max = Math.max(...Object.values(scores));
  if (max > 0) nids.forEach(id => { scores[id] = scores[id] / max; });
  return scores;
}

// ══════════════════════════════════╁E// ① ② 感情の物琁E��チE��  E電荷の流れと伝播
// ══════════════════════════════════╁E// ノ�Eドを「発火」させる�E�タチE�E�E�活動電位�E発生！Efunction fireNode(id) {
  const g = currentGraph();
  const n = g?.nodes[id];
  if (!n) return;

  ensurePhysicsFields(n);
  const now = Date.now();

  // ① 発火履歴を記録�E�直迁E件まで保持�E�E  n.fireHistory.push(now);
  if (n.fireHistory.length > 8) n.fireHistory.shift();
  n.lastFired = now;
  n.charge = Math.min(1, n.charge + FIRE_CHARGE_BOOST);
  lastFiredNodeId = id;

  // ② 電流が流れめEↁE隣接ノ�Eドへ電場・磁場のように伝播
  const outEdges = g.edges.filter(e => e.from === id || e.to === id);
  outEdges.forEach(e => {
    ensureEdgePhysics(e);
    const otherId = e.from === id ? e.to : e.from;
    const other = g.nodes[otherId];
    if (!other) return;
    ensurePhysicsFields(other);

    const transferred = n.charge * (e.weight || 1) * e.conductance * PROPAGATION_FACTOR;
    other.charge = Math.min(1, other.charge + transferred);

    // ① 同時発火してぁE��エチE��は伝導率�E�シナ�Eス強度�E�を強化＝Hebbian learning
    const otherRecentlyFired = other.lastFired && (now - other.lastFired < SYNC_WINDOW_MS);
    if (otherRecentlyFired) {
      e.conductance = Math.min(2, e.conductance + HEBBIAN_STEP);
    }
  });

  saveGraphs();
}

function ensurePhysicsFields(n) {
  if (n.charge === undefined) n.charge = 0;
  if (!n.fireHistory) n.fireHistory = [];
  if (n.lastFired === undefined) n.lastFired = 0;
}
function ensureEdgePhysics(e) {
  if (e.conductance === undefined) e.conductance = 1.0;
}

// charge の時間減衰�E�フレームごとに呼ぶ�E�Efunction decayCharges(dtMs) {
  const g = currentGraph();
  if (!g) return;
  const decayFactor = Math.exp(-dtMs / CHARGE_DECAY_TAU);
  Object.values(g.nodes).forEach(n => {
    if (n.charge) n.charge *= decayFactor;
    if (n.charge < 0.01) n.charge = 0;
  });
}

// ══════════════════════════════════╁E// ③ 神経ネチE��ワークの同期検�E�E�コヒ�Eレンス�E�E// ══════════════════════════════════╁Efunction estimateFreqBand(n) {
  const h = n.fireHistory;
  if (!h || h.length < 2) return null;
  // 直近�E発火間隔の平坁E��Es�E�EↁE疑似周波数�E�Ez�E�に変換
  const recent = h.slice(-4);
  let totalGap = 0, count = 0;
  for (let i = 1; i < recent.length; i++) {
    totalGap += recent[i] - recent[i-1];
    count++;
  }
  if (count === 0) return null;
  const avgGapMs = totalGap / count;
  if (avgGapMs <= 0) return null;
  const freqHz = 1000 / avgGapMs;
  if (freqHz >= BAND_THRESH.gamma) return 'gamma';
  if (freqHz >= BAND_THRESH.beta)  return 'beta';
  if (freqHz >= BAND_THRESH.alpha) return 'alpha';
  if (freqHz >= BAND_THRESH.theta) return 'theta';
  return 'delta';
}

// 時間窓�Eに発火してぁE��、互いに連結してぁE��ノ�Eド群をクラスタ匁Efunction detectSyncClusters() {
  const g = currentGraph();
  if (!g) return [];
  const now = Date.now();
  const activeIds = Object.keys(g.nodes).filter(id => {
    const n = g.nodes[id];
    return n.lastFired && (now - n.lastFired < SYNC_WINDOW_MS);
  });
  if (activeIds.length === 0) return [];

  // 隣接マッチE  const adj = {};
  activeIds.forEach(id => adj[id] = []);
  g.edges.forEach(e => {
    if (adj[e.from] && activeIds.includes(e.to)) adj[e.from].push(e.to);
    if (adj[e.to] && activeIds.includes(e.from)) adj[e.to].push(e.from);
  });

  // 連結�E刁E��探索
  const visited = new Set();
  const clusters = [];
  activeIds.forEach(start => {
    if (visited.has(start)) return;
    const stack = [start];
    const comp = [];
    while (stack.length) {
      const cur = stack.pop();
      if (visited.has(cur)) continue;
      visited.add(cur);
      comp.push(cur);
      (adj[cur]||[]).forEach(nb => { if (!visited.has(nb)) stack.push(nb); });
    }
    if (comp.length === 0) return;

    // 帯域を多数決で決宁E    const bandCounts = {};
    let earliestFire = Infinity, latestFire = 0;
    comp.forEach(id => {
      const n = g.nodes[id];
      const band = estimateFreqBand(n) || 'delta';
      bandCounts[band] = (bandCounts[band]||0) + 1;
      earliestFire = Math.min(earliestFire, n.fireHistory[0] || n.lastFired);
      latestFire = Math.max(latestFire, n.lastFired);
    });
    const band = Object.entries(bandCounts).sort((a,b)=>b[1]-a[1])[0][0];
    const density = comp.length / activeIds.length;
    const durationMs = latestFire - earliestFire;

    clusters.push({ nodeIds: comp, band, density, durationMs, size: comp.length });
  });

  return clusters.filter(c => c.size >= 2); // 単独ノ�Eド�EクラスタとみなさなぁE}

function updateAttractorState() {
  currentSyncClusters = detectSyncClusters();
  if (currentSyncClusters.length === 0) { currentAttractor = null; updateAttractorBar(); return; }
  // 最大クラスタを代表attractorとして採用
  const main = currentSyncClusters.sort((a,b)=>b.size-a.size)[0];

  updateAttractorBar();
}

// ══════════════════════════════════╁E// CANVAS RENDER
// ══════════════════════════════════╁Efunction resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

function worldToScreen(wx, wy) {
  return { x: wx * vpScale + vpX, y: wy * vpScale + vpY };
}
function screenToWorld(sx, sy) {
  return { x: (sx - vpX) / vpScale, y: (sy - vpY) / vpScale };
}

function centerView() {
  const g = currentGraph();
  if (!g) return;
  const nids = Object.keys(g.nodes);
  if (nids.length === 0) { vpX = canvas.width/2; vpY = canvas.height/2; vpScale = 1; return; }
  let minX=Infinity, maxX=-Infinity, minY=Infinity, maxY=-Infinity;
  nids.forEach(id => {
    const n = g.nodes[id];
    minX = Math.min(minX, n.x); maxX = Math.max(maxX, n.x);
    minY = Math.min(minY, n.y); maxY = Math.max(maxY, n.y);
  });
  const cx = (minX+maxX)/2, cy = (minY+maxY)/2;
  const margin = 120;
  const scaleX = (canvas.width - margin*2) / Math.max(maxX-minX, 1);
  const scaleY = (canvas.height - margin*2) / Math.max(maxY-minY, 1);
  vpScale = Math.min(Math.min(scaleX, scaleY), 1.2);
  vpX = canvas.width/2 - cx * vpScale;
  vpY = canvas.height/2 - cy * vpScale;
}

function drawArrow(x1, y1, x2, y2, color, weight, glow) {
  const dx = x2-x1, dy = y2-y1;
  const len = Math.sqrt(dx*dx+dy*dy);
  if (len < 1) return;
  const ux = dx/len, uy = dy/len;
  // 矢印の先端をノード端まで縮める
  const r = NODE_R * vpScale;
  const ex = x2 - ux*r, ey = y2 - uy*r;
  const sx = x1 + ux*r, sy = y1 + uy*r;

  ctx.save();
  ctx.globalAlpha = glow ? 0.9 : 0.55;
  ctx.strokeStyle = color;
  ctx.lineWidth = (1 + weight * 0.7) * vpScale;
  ctx.lineCap = 'round';
  if (glow) {
    ctx.shadowColor = color;
    ctx.shadowBlur = 8;
  }
  ctx.beginPath();
  ctx.moveTo(sx, sy);
  ctx.lineTo(ex, ey);
  ctx.stroke();

  // 矢印ヘッチE  const hs = 10 * vpScale;
  const angle = Math.atan2(ey-sy, ex-sx);
  ctx.fillStyle = color;
  ctx.shadowBlur = glow ? 8 : 0;
  ctx.beginPath();
  ctx.moveTo(ex, ey);
  ctx.lineTo(ex - hs*Math.cos(angle-0.4), ey - hs*Math.sin(angle-0.4));
  ctx.lineTo(ex - hs*Math.cos(angle+0.4), ey - hs*Math.sin(angle+0.4));
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawEdgeWeight(x1, y1, x2, y2, w) {
  const mx = (x1+x2)/2, my = (y1+y2)/2;
  ctx.save();
  ctx.fillStyle = 'rgba(245,200,66,0.9)';
  ctx.font = `bold ${11*vpScale}px -apple-system`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(`ÁE{w}`, mx, my - 10*vpScale);
  ctx.restore();
}

// ② 電流が流れてぁE��様子を示すパルス�E�エチE��上を流れる�E点�E�Efunction drawCurrentPulse(x1, y1, x2, y2, charge, color) {
  if (charge < 0.05) return;
  const t = (Date.now() % 900) / 900;
  const px = x1 + (x2-x1) * t;
  const py = y1 + (y2-y1) * t;
  ctx.save();
  ctx.globalAlpha = Math.min(1, charge);
  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.arc(px, py, 3.5 * vpScale, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawNode(n, id, score, phase) {
  const s = worldToScreen(n.x, n.y);
  const r = NODE_R * vpScale;
  const isSel = selectedNode === id;
  const isConnFrom = connectFrom === id;
  const glowAmt = score * (0.5 + 0.5 * Math.sin(phase + (n.x+n.y)*0.01));

  ctx.save();

  // グロー
  if (glowAmt > 0.3 || isSel || isConnFrom) {
    ctx.shadowColor = isConnFrom ? '#F5C842' : (isSel ? '#fff' : n.color || '#4A9EFF');
    ctx.shadowBlur = 8 + glowAmt * 24;
  }

  // 外リング�E�選択�E接続！E  if (isSel || isConnFrom) {
    ctx.beginPath();
    ctx.arc(s.x, s.y, r + 5*vpScale, 0, Math.PI*2);
    ctx.strokeStyle = isConnFrom ? '#F5C842' : 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 2*vpScale;
    ctx.stroke();
  }

  // 本佁E  const grad = ctx.createRadialGradient(s.x - r*0.3, s.y - r*0.3, r*0.1, s.x, s.y, r);
  const col = n.color || '#4A9EFF';
  grad.addColorStop(0, col + 'CC');
  grad.addColorStop(1, col + '55');
  ctx.beginPath();
  ctx.arc(s.x, s.y, r, 0, Math.PI*2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = col + 'AA';
  ctx.lineWidth = 1.5*vpScale;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // ① 電荷リング�E�Eharge量を冁E�Eの光輪で表現�E�E  if (n.charge > 0.03) {
    ctx.beginPath();
    ctx.arc(s.x, s.y, r * 0.7, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(255,255,255,${n.charge * 0.7})`;
    ctx.lineWidth = 2 * vpScale;
    ctx.stroke();
  }

  // スコアリング�E�重要度�E�E  if (score > 0) {
    const pct = score;
    ctx.beginPath();
    ctx.arc(s.x, s.y, r + 3*vpScale, -Math.PI/2, -Math.PI/2 + Math.PI*2*pct);
    ctx.strokeStyle = `rgba(245,200,66,${0.4 + pct*0.5})`;
    ctx.lineWidth = 3*vpScale;
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  // ラベル
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const fs = Math.max(10, Math.min(14, 12)) * vpScale;
  ctx.font = `700 ${fs}px -apple-system`;
  const maxW = r * 1.6;
  const label = n.label || '?';
  // 折り返し
  const words = label.split('');
  const lineH = fs * 1.3;
  const lines = [];
  let cur = '';
  for (const ch of words) {
    if (ctx.measureText(cur+ch).width > maxW) { lines.push(cur); cur = ch; }
    else cur += ch;
  }
  if (cur) lines.push(cur);
  const totalH = lines.length * lineH;
  lines.forEach((line, i) => {
    ctx.fillText(line, s.x, s.y - totalH/2 + lineH*(i+0.5));
  });

  // 重みバッジ
  const badge = `W${n.weight||3}`;
  ctx.font = `600 ${9*vpScale}px -apple-system`;
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.fillText(badge, s.x, s.y + r * 0.7);

  ctx.restore();
}

// ③④ 同期クラスタの波紋エフェクト（γ波風リング�E� Eattractorの可視化
function drawSyncRipples(phase) {
  if (!currentSyncClusters.length) return;
  const g = currentGraph();
  if (!g) return;

  currentSyncClusters.forEach(cluster => {
    const style = BAND_STYLE[cluster.band] || BAND_STYLE.delta;
    // クラスタの重忁E    let cx = 0, cy = 0;
    cluster.nodeIds.forEach(id => {
      const n = g.nodes[id];
      cx += n.x; cy += n.y;
    });
    cx /= cluster.nodeIds.length; cy /= cluster.nodeIds.length;
    const center = worldToScreen(cx, cy);

    // 吁E��ードを匁E�E波紋を個別に描く
    cluster.nodeIds.forEach(id => {
      const n = g.nodes[id];
      const s = worldToScreen(n.x, n.y);
      const baseR = NODE_R * vpScale;
      for (let i = 0; i < 3; i++) {
        const ringPhase = (phase * style.speed * 3 + i * 0.9) % 3;
        const ringR = baseR + ringPhase * 22 * vpScale;
        const alpha = Math.max(0, 1 - ringPhase / 3) * 0.5 * cluster.density;
        if (alpha <= 0.01) continue;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = style.color;
        ctx.lineWidth = 1.6 * vpScale;
        ctx.beginPath();
        ctx.arc(s.x, s.y, ringR, 0, Math.PI*2);
        ctx.stroke();
        ctx.restore();
      }
    });

    // クラスタ全体を囲む薁E��帯域ラベル
    if (cluster.nodeIds.length >= 2 && vpScale > 0.4) {
      ctx.save();
      ctx.globalAlpha = 0.85;
      ctx.fillStyle = style.color;
      ctx.font = `700 ${11*vpScale}px -apple-system`;
      ctx.textAlign = 'center';
      ctx.fillText(style.label, center.x, center.y - NODE_R*vpScale - 26*vpScale);
      ctx.restore();
    }
  });
}

function render(now) {
  const dt = now ? (now - lastFrameTime) : 16;
  lastFrameTime = now || performance.now();

  resizeCanvas();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  glowPhase += 0.04;

  const g = currentGraph();
  if (!g) { animFrame = requestAnimationFrame(render); return; }

  // ① 電荷の自然減衰
  decayCharges(dt);

  const scores = computeScores();

  // Draw edges
  g.edges.forEach(e => {
    const from = g.nodes[e.from], to = g.nodes[e.to];
    if (!from || !to) return;
    ensureEdgePhysics(e);
    const fs = worldToScreen(from.x, from.y);
    const ts = worldToScreen(to.x, to.y);
    const isSel = selectedEdge && selectedEdge.from===e.from && selectedEdge.to===e.to;
    const col = isSel ? '#FF5F5F' : (from.color || '#4A9EFF');
    drawArrow(fs.x, fs.y, ts.x, ts.y, col, e.weight||1, isSel);
    if (vpScale > 0.5) drawEdgeWeight(fs.x, fs.y, ts.x, ts.y, e.weight||1);
    // ② 電流パルス�E�Eromに電荷が乗ってぁE��ば流れて見える！E    drawCurrentPulse(fs.x, fs.y, ts.x, ts.y, from.charge||0, col);
  });

  // 接続モード中のプレビューライン
  if (mode === MODE.CONNECT && connectFrom && g.nodes[connectFrom]) {
    // drawn dynamically in pointermove  Eskip here
  }

  // ③④ 同期波紋（ノードより�Eに描いて、ノードが上に乗るように�E�E  drawSyncRipples(glowPhase);

  // Draw nodes
  Object.entries(g.nodes).forEach(([id, n]) => {
    ensurePhysicsFields(n);
    drawNode(n, id, scores[id] || 0, glowPhase);
  });

  animFrame = requestAnimationFrame(render);
}

// ══════════════════════════════════╁E// SCORE BAR

  const scores = computeScores();

  const sorted = Object.entries(scores)
    .filter(([id]) => g.nodes[id])
    .sort((a,b) => b[1]-a[1])

  const bar = document.getElementById('scoreBar');

      ${n.label || '?'} ${pct}%
    </span>`;
  }).join('');
}

// ══════════════════════════════════╁E// INPUT HANDLING
// ══════════════════════════════════╁Efunction getPos(e) {
  const r = canvas.getBoundingClientRect();
  if (e.touches) {
    return { x: e.touches[0].clientX - r.left, y: e.touches[0].clientY - r.top };
  }
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

function hitNode(sx, sy) {
  const g = currentGraph();
  if (!g) return null;
  const w = screenToWorld(sx, sy);
  const r = NODE_R;
  for (const [id, n] of Object.entries(g.nodes)) {
    const dx = n.x - w.x, dy = n.y - w.y;
    if (dx*dx + dy*dy < r*r) return id;
  }
  return null;
}

function hitEdge(sx, sy) {
  const g = currentGraph();
  if (!g) return null;
  const w = screenToWorld(sx, sy);
  const thresh = 18 / vpScale;
  for (const e of g.edges) {
    const fn = g.nodes[e.from], tn = g.nodes[e.to];
    if (!fn || !tn) continue;
    const dx = tn.x - fn.x, dy = tn.y - fn.y;
    const len = Math.sqrt(dx*dx+dy*dy);
    if (len < 1) continue;
    const t = Math.max(0, Math.min(1, ((w.x-fn.x)*dx+(w.y-fn.y)*dy)/(len*len)));
    const px = fn.x + t*dx - w.x, py = fn.y + t*dy - w.y;
    if (Math.sqrt(px*px+py*py) < thresh) return e;
  }
  return null;
}

// Pointer events
let pointerDown = false;
let pointerMoved = false;
let pointerStartPos = { x:0, y:0 };

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  pointerDown = true;
  pointerMoved = false;
  const pos = getPos(e);
  pointerStartPos = pos;

  const hitN = hitNode(pos.x, pos.y);

  if (mode === MODE.EDIT) {
    if (hitN) { selectedNode = hitN; }
    else {
      const hitE = hitEdge(pos.x, pos.y);
      if (hitE) { selectedEdge = hitE; showEdgeHint(hitE); }
      else { selectedNode = null; selectedEdge = null; }
    }
    document.getElementById('deleteNodeBtn').style.display = selectedNode ? '' : 'none';
  } else if (mode === MODE.CONNECT) {
    if (hitN) connectFrom = hitN;
  } else {
    // ADD mode�E�ドラチE��移動�E無効。�E動レイアウトが位置を管琁E��るためE��E    if (hitN) { selectedNode = hitN; }
  }
});

canvas.addEventListener('pointermove', e => {
  if (!pointerDown) return;
  const pos = getPos(e);
  const dx = pos.x - pointerStartPos.x, dy = pos.y - pointerStartPos.y;
  if (Math.sqrt(dx*dx+dy*dy) > 4) pointerMoved = true;

  if (dragging) {
    const w = screenToWorld(pos.x, pos.y);
    const g = currentGraph();
    if (g && g.nodes[dragging.nodeId]) {
      g.nodes[dragging.nodeId].x = w.x;
      g.nodes[dragging.nodeId].y = w.y;
    }
  } else if (!dragging && pointerMoved && !connectFrom) {
    // pan
    vpX += pos.x - (pointerStartPos.x + (pointerMoved ? 0 : dx));
    vpY += pos.y - (pointerStartPos.y + (pointerMoved ? 0 : dy));
    pointerStartPos = pos;
  }
});

canvas.addEventListener('pointerup', e => {
  if (!pointerDown) return;
  pointerDown = false;
  const pos = getPos(e);
  const hitN = hitNode(pos.x, pos.y);

  if (dragging) {
    saveGraphs();
    updateScoreBar();
    dragging = null;
    return;
  }

  if (!pointerMoved) {
    // TAP
    if (mode === MODE.ADD) {
      if (!hitN) {
        // 新規ノード追加
        const w = screenToWorld(pos.x, pos.y);
        addNode(w.x, w.y);
      } else {
        // ① タチE�E�E�発火�E�電荷を流す�E�してからノ�Eド編雁E��開く
        fireNode(hitN);
        openNodeSheet(hitN);
      }
    } else if (mode === MODE.CONNECT) {
      if (connectFrom && hitN && hitN !== connectFrom) {
        addEdge(connectFrom, hitN);
        connectFrom = null;
      } else if (hitN) {
        connectFrom = hitN;
        fireNode(hitN);
      } else {
        connectFrom = null;
      }
    } else if (mode === MODE.EDIT) {
      if (hitN) { fireNode(hitN); openNodeSheet(hitN); }
    }
  }
  dragging = null;
});

// Pinch zoom
let lastPinchDist = 0;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 2) lastPinchDist = pinchDist(e);
}, { passive:true });
canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 2) {
    const dist = pinchDist(e);
    const ratio = dist / lastPinchDist;
    const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    vpX = cx - (cx - vpX) * ratio;
    vpY = cy - (cy - vpY) * ratio;
    vpScale = Math.max(0.3, Math.min(3, vpScale * ratio));
    lastPinchDist = dist;
    e.preventDefault();
  }
}, { passive:false });

function pinchDist(e) {
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  return Math.sqrt(dx*dx+dy*dy);
}

// ══════════════════════════════════╁E// NODE / EDGE OPERATIONS
// ══════════════════════════════════╁Efunction addNode(wx, wy) {
  const g = currentGraph();
  if (!g) return;
  const id = uid();
  g.nodes[id] = {
    id, label:'新しいノ�EチE,
    x: wx, y: wy,
    weight: 3,
    color: '#4A9EFF',
    memo: '',
    charge: 0,
    fireHistory: [],
    lastFired: 0,
  };
  applyFlowchartLayout();
  saveGraphs();
  updateScoreBar();
  openNodeSheet(id, true);
}

function addEdge(from, to) {
  const g = currentGraph();
  if (!g) return;
  // 重褁E��ェチE��
  if (g.edges.find(e => e.from===from && e.to===to)) { showToast('すでに接続済みでぁE); return; }
  g.edges.push({ from, to, weight:1, conductance:1.0 });
  applyFlowchartLayout();
  saveGraphs();
  updateScoreBar();
  showToast('接続しました');
}

function deleteNode(id) {
  const g = currentGraph();
  if (!g) return;
  delete g.nodes[id];
  g.edges = g.edges.filter(e => e.from!==id && e.to!==id);
  selectedNode = null;
  document.getElementById('deleteNodeBtn').style.display = 'none';
  applyFlowchartLayout();
  saveGraphs();
  updateScoreBar();
}

function deleteEdge(e) {
  const g = currentGraph();
  if (!g) return;
  g.edges = g.edges.filter(x => !(x.from===e.from && x.to===e.to));
  selectedEdge = null;
  applyFlowchartLayout();
  saveGraphs();
  updateScoreBar();
}

  editingNodeId = id;
  const g = currentGraph();
  const n = g?.nodes[id];
  if (!n) return;
  ensurePhysicsFields(n);

  document.getElementById('nodeSheetTitle').textContent = isNew ? '新規ノーチE : 'ノ�Eド編雁E;
  document.getElementById('nLabel').value = n.label || '';
  document.getElementById('nMemo').value = n.memo || '';
  const slider = document.getElementById('nWeight');

  document.querySelectorAll('.color-swatch').forEach(sw => {
    sw.classList.toggle('active', sw.dataset.color === editingNodeColor);
  });

  // エチE��惁E��
  const inEdges  = g.edges.filter(e => e.to===id);

  inEdges.forEach(e  => edgeLines.push(`ↁE${g.nodes[e.from]?.label||'?'} (ÁE{e.weight||1})`));
  outEdges.forEach(e => edgeLines.push(`ↁE${g.nodes[e.to]?.label||'?'} (ÁE{e.weight||1})`));
  document.getElementById('edgeInfo').textContent = edgeLines.join('\n') || 'なぁE;

  // 物琁E��スチE�Eタス表示
  const band = estimateFreqBand(n);
  const bandLabel = band ? BAND_STYLE[band].label : '未発火';
  const cluster = currentSyncClusters.find(c => c.nodeIds.includes(id));
  const attr = cluster ? classifyAttractor(cluster) : null;
  document.getElementById('physicsBox').innerHTML =
    `電荷釁E <b>${Math.round(n.charge*100)}%</b>　発火回数: <b>${n.fireHistory.length}</b><br>` +
    `推定帯埁E <b>${bandLabel}</b><br>` +
    `同期attractor: <b>${attr ? attr.label : '未収束'}</b>`;

  openSheet('nodeSheet');
  setTimeout(() => {
    if (isNew) document.getElementById('nLabel').select();

}

// ══════════════════════════════════╁E// is_transfer 連携
// ══════════════════════════════════╁E// アイチE��1件を、感惁E��タチE�Eタがあれ�Eそれを反映したノ�Eドとして追加する共通�E琁Efunction addNodeFromTransferItem(item, index, total, g) {
  const angle = (index / total) * Math.PI * 2;
  const dist = 200 + Math.random() * 100;
  const id = item.id || uid();
  if (g.nodes[id]) return null;

  const meta = item._emotionMeta || null;
  const band = meta?.band || meta?.textBand || meta?.fmBand || null;
  const bandStyle = band ? BAND_STYLE[band] : null;
  const cols = ['#4A9EFF','#4AE09A','#F5C842','#C084FC','#FB923C','#FF5F5F'];

  g.nodes[id] = {
    id,
    label: (item.title || '無顁E).slice(0,20),
    memo: (item.body || '').replace(/<[^>]+>/g,'').slice(0,200),
    weight: 3,
    // 感情メタがあれ�Eそ�E帯域�E色を使ぁE��なければ従来通り虹色を割り当て、E    color: bandStyle ? bandStyle.color : cols[index % cols.length],
    x: Math.cos(angle) * dist,
    y: Math.sin(angle) * dist,
    charge: 0,
    fireHistory: [],
    lastFired: 0,
    sourceApp: item._emotionMeta ? (item.source || null) : undefined,
    emotionBand: band || undefined,
  };
  return id;
}

function importFromTransfer() {
  try {
    const raw = localStorage.getItem(LS_TRANSFER);
    if (!raw) { showToast('is_transferにチE�Eタがありません'); return; }
    const payload = JSON.parse(raw);
    const items = payload.items || (Array.isArray(payload) ? payload : null);
    if (!items || items.length === 0) { showToast('インポ�EトできるチE�Eタがありません'); return; }

    const g = currentGraph();
    if (!g) return;

    let added = 0;
    items.forEach((item, i) => {
      const id = addNodeFromTransferItem(item, i, items.length, g);
      if (id) { added++; fireNode(id); }
    });

// ── ブリチE��からの自動送信(is_emotion_transfer)を静かに取り込む ──
// quick-ref-bridge等が保存�Eた�Eに書き込む1件チE�Eタを、確認なしで
// 因果グラフに自動追加する。既に取り込んだタイムスタンプ�E記録して重褁E��止、Elet lastEmotionTransferTs = Number(localStorage.getItem('fm_last_emotion_ts') || 0);

function checkEmotionTransfer() {
  try {
    const raw = localStorage.getItem(LS_EMOTION_TRANSFER);
    if (!raw) return;
    const payload = JSON.parse(raw);
    if (!payload.timestamp || payload.timestamp <= lastEmotionTransferTs) return;
    if (payload.source === 'flow-mind') return; // 自刁E�E身の書き込みは無要E    const items = payload.items;
    if (!Array.isArray(items) || items.length === 0) return;

    const g = currentGraph();
    if (!g) return;

    let added = 0, lastId = null;
    items.forEach((item, i) => {
      // 自動受信ではitemに_emotionMetaが無ぁE��とがある�Eで、�Eイロード�E体�EemotionMetaで補う
      const merged = item._emotionMeta ? item : { ...item, _emotionMeta: payload.emotionMeta };
      const id = addNodeFromTransferItem(merged, i, items.length, g);
      if (id) { added++; lastId = id; }
    });
    if (added > 0) {
      applyFlowchartLayout();
      saveGraphs();
      updateScoreBar();
      if (lastId) fireNode(lastId);
      showToast(`${payload.source || '他アプリ'}から${added}件を受信しました`);
    }
    lastEmotionTransferTs = payload.timestamp;
    localStorage.setItem('fm_last_emotion_ts', String(lastEmotionTransferTs));
  } catch(e) {
    console.warn('checkEmotionTransfer error', e);
  }
}

// ══════════════════════════════════╁E// AI LAYER
// ══════════════════════════════════╁Easync function callAI(prompt) {
  const modelKey = localStorage.getItem(LS_MODEL) || 'claude';
  const proxyUrl = localStorage.getItem(LS_PROXY) || '';
  const m = MODELS[modelKey] || MODELS.claude;
  const keyMap = { claude:LS_CLAUDE, gemini:LS_GEMINI, openai:LS_OPENAI };
  const apiKey = localStorage.getItem(keyMap[modelKey]) || '';

  if (!apiKey && !proxyUrl) throw new Error(`APIキーが未設定です。quick-refの⚙️設定から�E力してください�E�E{m.label}�E�`);

  if (proxyUrl) {
    const res = await fetch(proxyUrl, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model:modelKey, prompt }),
    });
    if (!res.ok) throw new Error(`Proxy error: ${res.status}`);
    const d = await res.json();
    return d.text || d.content || JSON.stringify(d);
  }

  if (modelKey === 'claude') {
    const res = await fetch(m.endpoint, {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,
        'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({ model:m.model, max_tokens:1024,
        messages:[{role:'user',content:prompt}] }),
    });
    const d = await res.json();
    if (!res.ok) throw new Error(d.error?.message || `Claude ${res.status}`);
    return d.content?.[0]?.text || '';
  }
  if (modelKey === 'gemini') {
    const res = await fetch(`${m.endpoint}?key=${apiKey}`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ contents:[{parts:[{text:prompt}]}],
        generationConfig:{maxOutputTokens:1024} }),
    });
    const d = await res.json();
    if (!res.ok) throw new Error(d.error?.message || `Gemini ${res.status}`);
    return d.candidates?.[0]?.content?.parts?.[0]?.text || '';
  }
  if (modelKey === 'openai') {
    const res = await fetch(m.endpoint, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},
      body: JSON.stringify({ model:m.model, max_tokens:1024,
        messages:[{role:'user',content:prompt}] }),
    });
    const d = await res.json();
    if (!res.ok) throw new Error(d.error?.message || `OpenAI ${res.status}`);
    return d.choices?.[0]?.message?.content || '';
  }
  throw new Error('未対応�EモチE��');
}

function buildGraphDescription() {
  const g = currentGraph();
  if (!g) return '';
  const scores = computeScores();
  const nodeLines = Object.entries(g.nodes)
    .sort((a,b) => (scores[b[0]]||0)-(scores[a[0]]||0))
    .map(([id,n]) => `・${n.label}�E��E己重み:${n.weight}、E��要度スコア:${Math.round((scores[id]||0)*100)}%�E�E{n.memo?` ↁE${n.memo}`:''}`);
  const edgeLines = g.edges.map(e =>
    `${g.nodes[e.from]?.label||'?'} →[ÁE{e.weight||1}]ↁE${g.nodes[e.to]?.label||'?'}`);
  return `グラフ名�E�E{g.name}\n\n【ノード】\n${nodeLines.join('\n')}\n\n【因果エチE��】\n${edgeLines.join('\n')||'なぁE}`;
}

  return `現在、以下�E神経同期パターン�E�電気振動�Eクラスタ�E�が検�EされてぁE��す：\n${lines.join('\n\n')}`;
}

// チE��ストからノードを即時作�Eし、直前に発火したノ�Eドへ因果エチE��で接続すめE// �E�＝孤立ノードにせず、既存�E思老E��ラフ�E中に位置づける�E�Efunction quickAddNode(text) {
  const g = currentGraph();

  const trimmed = text.trim();

  const connectSourceId = (lastFiredNodeId && g.nodes[lastFiredNodeId]) ? lastFiredNodeId : null;
  const basePos = connectSourceId
    ? { x: g.nodes[connectSourceId].x, y: g.nodes[connectSourceId].y }
    : screenToWorld(canvas.width/2, canvas.height/2);
  const angle = Math.random() * Math.PI * 2;

  const pos = { x: basePos.x + Math.cos(angle)*dist, y: basePos.y + Math.sin(angle)*dist };

  const id = uid();

    memo: trimmed,                // 全斁E��忁E��メモに保持�E�省略しなぁE��E    x: pos.x, y: pos.y,
    weight: 3,
    color: '#4A9EFF',
    charge: 0,
    fireHistory: [],
    lastFired: 0,
  };

  // 直前に発火したノ�Eドがあれば、因果�E連鎖として自動接綁E  if (connectSourceId) {
    g.edges.push({ from: connectSourceId, to: id, weight: 1, conductance: 1.0 });

}

// ── 音声入力！EediaRecorderで録音 ↁEAI(Whisper系)で斁E��起こし�E�──
// 補足�E�iOS Safariはブラウザ標準�E音声認譁ESpeechRecognition)に対応してぁE��ぁE��め、E// 録音してAI APIに送って斁E��起こしする方式にしてぁE��す、Efunction startQcRecording() {
  if (qcRecording) return;
  if (!window.isSecureContext) {
    showToast('マイクはhttps環墁E��のみ使用できまぁE);
    return;
  }
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showToast('こ�Eブラウザ/表示モード�E録音に対応してぁE��せん');
    return;
  }
  if (typeof MediaRecorder === 'undefined') {
    showToast('こ�E環墁E�EMediaRecorderに対応してぁE��せん');
    return;
  }
  navigator.mediaDevices.getUserMedia({ audio:true }).then(stream => {
    qcChunks = [];
    const mimeType = MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4'
      : (MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : '');
    try {
      qcRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
    } catch (recErr) {
      console.error(recErr);
      showToast('録音の初期化に失敗しました: ' + recErr.message);
      stream.getTracks().forEach(t => t.stop());
      return;
    }
    qcRecorder.ondataavailable = e => { if (e.data.size > 0) qcChunks.push(e.data); };
    qcRecorder.onerror = e => {
      console.error('MediaRecorder error', e.error);
      showToast('録音エラー: ' + (e.error?.message || e.error?.name || '不�Eなエラー'));
    };
    qcRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      if (qcChunks.length === 0) { setQcStatus(''); showToast('録音チE�Eタが取得できませんでした'); return; }
      const blob = new Blob(qcChunks, { type: qcRecorder.mimeType || 'audio/webm' });
      transcribeAndFill(blob);
    };
    qcRecorder.start();
    qcRecording = true;
    document.getElementById('qcMicBtn').classList.add('recording');
    document.getElementById('quickCaptureFab').classList.add('recording');
    setQcStatus('🎙 録音中…もう一度タチE�Eで斁E��起こし', true);
  }).catch(err => {
    console.error(err);
    // iOSでよくある原因を判別してメチE��ージを�Eし�Eける
    let msg = 'マイクへのアクセスが忁E��でぁE;
    if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
      msg = 'マイクへのアクセスが拒否されてぁE��す。設宁E> Safari(また�Eこ�Eアプリ) > マイク を確認してください';
    } else if (err.name === 'NotFoundError') {
      msg = 'マイクが見つかりません';
    } else if (err.name === 'NotReadableError') {
      msg = '他�Eアプリが�Eイクを使用中の可能性がありまぁE;
    } else if (err.name === 'SecurityError') {
      msg = 'セキュリチE��制限によりマイクを使用できません(https環墁E��確認してください)';
    }
    showToast(msg + `�E�E{err.name}�E�`);
  });
}

async function transcribeAndFill(blob) {
  setQcStatus('⏳ 斁E��起こし中…', true);
  const apiKey = localStorage.getItem(LS_OPENAI) || '';
  const proxyUrl = localStorage.getItem(LS_PROXY) || '';
  if (!apiKey && !proxyUrl) {
    setQcStatus('');
    showToast('斁E��起こしにはOpenAI APIキーが忁E��です！Euick-refの⚙️設定！E);
    return;
  }
  try {
    let text = '';
    if (proxyUrl) {
      const form = new FormData();
      form.append('file', blob, 'audio.' + (blob.type.includes('mp4') ? 'mp4' : 'webm'));
      form.append('purpose', 'transcription');
      const res = await fetch(proxyUrl.replace(/\/$/, '') + '/transcribe', { method:'POST', body: form });
      if (!res.ok) throw new Error(`Proxy transcribe error: ${res.status}`);
      const d = await res.json();
      text = d.text || '';
    } else {
      const form = new FormData();
      form.append('file', blob, 'audio.' + (blob.type.includes('mp4') ? 'mp4' : 'webm'));
      form.append('model', 'whisper-1');
      form.append('language', 'ja');
      const res = await fetch('https://api.openai.com/v1/audio/transcriptions', {
        method:'POST',
        headers: { 'Authorization': `Bearer ${apiKey}` },
        body: form,
      });
      const d = await res.json();
      if (!res.ok) throw new Error(d.error?.message || `Whisper ${res.status}`);
      text = d.text || '';
    }
    const input = document.getElementById('qcInput');
    input.value = (input.value ? input.value + '\n' : '') + text.trim();
    autoGrowQc();
    setQcStatus('');
  } catch(e) {
    console.error(e);
    setQcStatus('');
    showToast('斁E��起こしに失敗しました: ' + e.message);
  }
}

// ── URL経由の即記録受信 ──
// index.html#capture=<encodeURIComponent(text)> で開くと、すぐ記録バ�EにチE��ストが入った状態で起動する、E// &auto=1 を付けるとバ�Eを開かずそ�Eままノ�Eド化する�E�例：iOSショートカチE��の「�E有」アクションから�E�、Efunction checkCaptureHash() {
  if (!location.hash.startsWith('#capture=')) return;
  try {
    const raw = location.hash.slice('#capture='.length);
    const [encoded, ...rest] = raw.split('&');
    const text = decodeURIComponent(encoded);
    const auto = rest.includes('auto=1');
    if (auto && text.trim()) {
      quickAddNode(text);
    } else {
      openQuickCapture(text);
    }
  } catch(e) { console.warn('capture hash parse error', e); }
  finally { history.replaceState(null, '', location.pathname); }
}

    if (payload.timestamp > localLastSync) {

        graphs = payload.data;

        if (!graphs[currentGraphId]) {
          currentGraphId = ids[0] || null;
          if (!currentGraphId) createGraph('はじめてのグラチE);
          else localStorage.setItem(LS_CURRENT, currentGraphId);
        }
        applyFlowchartLayout();
        saveGraphs();

function openSyncSheet() {

  document.getElementById('syncMobileBox').style.display = isDesktop ? 'none' : '';
  refreshSyncStatus();

async function refreshSyncStatus() {
  if (!window.SyncBridge) return;
  if (SyncBridge.isDesktopCapable()) {
    const connected = await SyncBridge.isConnected('flow-mind');
    const ts = SyncBridge.getLastSyncedAt('flow-mind');
    document.getElementById('syncDesktopStatus').textContent = connected
      ? `接続済み${ts ? ' / 最終同朁E ' + new Date(ts).toLocaleString('ja-JP') : ''}`
      : '未接綁E;
  } else {
    const ts = SyncBridge.getLastSyncedAt('flow-mind-sync');
    document.getElementById('syncMobileStatus').textContent = ts
      ? `最終書き�EぁE ${new Date(ts).toLocaleString('ja-JP')}`
      : 'まだ書き�EしてぁE��せん';
  }
}

function wireSyncSheet() {

    try {
      await SyncBridge.connectFolder('flow-mind');
      showToast('フォルダに接続しました');

      SyncBridge.autoSave('flow-mind', graphs); // 接続直後に現在の状態を一度書き込む
      refreshSyncStatus();
    } catch(e) {
      console.error(e);

    }
  });

  document.getElementById('syncNowBtn').addEventListener('click', async () => {

    if (!payload || !payload.data) return;
    if (!confirm('現在のグラフを読み込んだチE�Eタで上書きします。よろしぁE��すか�E�E)) return;
    graphs = payload.data;
    const ids = Object.keys(graphs);
    currentGraphId = ids[0] || null;
    if (!currentGraphId) createGraph('はじめてのグラチE);
    else localStorage.setItem(LS_CURRENT, currentGraphId);

    saveGraphs();
    centerView();
