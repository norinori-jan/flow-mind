<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0D0F14">
<title>flow-mind</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/icon.svg">
<style>
/* в”Җв”Җ TOKENS в”Җв”Җ */
:root {
  --bg:       #0D0F14;
  --surface:  #161A22;
  --surface2: #1E232E;
  --border:   rgba(255,255,255,0.08);
  --border2:  rgba(255,255,255,0.14);
  --gold:     #F5C842;
  --gold-dim: rgba(245,200,66,0.18);
  --blue:     #4A9EFF;
  --red:      #FF5F5F;
  --green:    #4AE09A;
  --text:     #E8EAF0;
  --text-dim: #6B7280;
  --text-mid: #9CA3AF;
  --r:        12px;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin:0; padding:0; }
html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;
  -webkit-font-smoothing:antialiased; }

/* в”Җв”Җ CANVAS LAYER в”Җв”Җ */
#graphCanvas {
  position:fixed; inset:0; width:100%; height:100%; touch-action:none; cursor:default;
}

/* в”Җв”Җ HEADER в”Җв”Җ */
header {
  position:fixed; top:0; left:0; right:0; z-index:20;
  display:flex; align-items:center; gap:10px; padding:calc(env(safe-area-inset-top)+10px) 14px 10px;
  background:linear-gradient(to bottom, rgba(13,15,20,0.96) 70%, transparent);
  pointer-events:none;
}
.app-title {
  font-size:15px; font-weight:800; color:var(--gold); letter-spacing:.05em;
  pointer-events:none;
}
.header-spacer { flex:1; }
header button { pointer-events:auto; }

.hdr-btn {
  background:rgba(255,255,255,0.06); border:1px solid var(--border2);
  border-radius:8px; color:var(--text); font-size:13px; font-weight:600;
  padding:6px 12px; cursor:pointer; display:flex; align-items:center; gap:5px;
  backdrop-filter:blur(8px); white-space:nowrap;
}
.hdr-btn:active { background:rgba(255,255,255,0.12); }
.hdr-btn.gold { border-color:rgba(245,200,66,0.4); color:var(--gold); }
.hdr-btn.gold:active { background:var(--gold-dim); }

/* в”Җв”Җ SCORE BAR (дёҠдҪҚгғҺгғјгғҒE в”Җв”Җ */
#scoreBar {
  position:fixed; top:calc(env(safe-area-inset-top)+52px); left:0; right:0; z-index:19;
  display:flex; gap:6px; padding:0 14px; overflow-x:auto; pointer-events:none;
  scrollbar-width:none;
}
#scoreBar::-webkit-scrollbar { display:none; }
.score-chip {
  flex-shrink:0; font-size:11px; font-weight:700; border-radius:100px;
  padding:4px 12px; border:1px solid; white-space:nowrap; pointer-events:none;
}

/* в”Җв”Җ ATTRACTOR BAR (ж„ҹжғ…зҠ¶ж…ӢиЎЁзӨә) в”Җв”Җ */
#attractorBar {
  position:fixed; top:calc(env(safe-area-inset-top)+86px); left:0; right:0; z-index:19;
  display:flex; justify-content:center; pointer-events:none;
}
.attractor-chip {
  font-size:12px; font-weight:800; border-radius:100px; padding:6px 16px;
  border:1px solid; backdrop-filter:blur(10px); letter-spacing:.04em;
  display:none; align-items:center; gap:6px;
}
.attractor-chip.show { display:flex; }
.attractor-dot { width:7px; height:7px; border-radius:50%; }

/* в”Җв”Җ TOOLBAR (дёӢйғЁ) в”Җв”Җ */
#toolbar {
  position:fixed; bottom:0; left:0; right:0; z-index:20;
  padding:10px 14px calc(env(safe-area-inset-bottom)+10px);
  background:linear-gradient(to top, rgba(13,15,20,0.97) 70%, transparent);
  display:flex; align-items:center; gap:8px;
}
.tool-btn {
  background:rgba(255,255,255,0.06); border:1px solid var(--border2);
  border-radius:10px; color:var(--text); font-size:13px; font-weight:600;
  padding:9px 14px; cursor:pointer; display:flex; align-items:center; gap:6px;
  backdrop-filter:blur(8px); white-space:nowrap; flex-shrink:0;
}
.tool-btn:active { background:rgba(255,255,255,0.12); }
.tool-btn.active { border-color:var(--gold); color:var(--gold); background:var(--gold-dim); }
.tool-btn.danger { border-color:rgba(255,95,95,0.4); color:var(--red); }
.tool-btn.danger:active { background:rgba(255,95,95,0.12); }
.tool-spacer { flex:1; }
#modeLabel {
  font-size:12px; color:var(--text-dim); pointer-events:none; text-align:center;
  position:absolute; bottom:calc(env(safe-area-inset-bottom)+54px); left:0; right:0;
}

/* в”Җв”Җ NODE SHEET в”Җв”Җ */
.sheet-overlay {
  position:fixed; inset:0; z-index:30; background:rgba(0,0,0,0.55);
  opacity:0; pointer-events:none; transition:opacity .2s;
}
.sheet-overlay.open { opacity:1; pointer-events:auto; }
.sheet {
  position:fixed; left:0; right:0; bottom:0; z-index:31;
  background:var(--surface); border-radius:20px 20px 0 0;
  border-top:1px solid var(--border2);
  max-height:85vh; display:flex; flex-direction:column;
  transform:translateY(100%); transition:transform .25s ease-out;
  box-shadow:0 -4px 40px rgba(0,0,0,0.6);
}
.sheet.open { transform:translateY(0); }
.sheet-handle { width:36px; height:4px; background:var(--border2); border-radius:2px; margin:10px auto 0; flex-shrink:0; }
.sheet-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 16px; border-bottom:1px solid var(--border); flex-shrink:0;
}
.sheet-header h2 { font-size:16px; font-weight:700; }
.sheet-header button { background:none; border:none; font-size:15px; color:var(--blue); padding:6px; cursor:pointer; font-weight:600; }
.sheet-body { overflow-y:auto; padding:16px 16px calc(env(safe-area-inset-bottom)+24px); }

.field-label { display:block; font-size:11px; color:var(--text-dim); font-weight:700;
  text-transform:uppercase; letter-spacing:.06em; margin:16px 0 6px; }
.field-label:first-child { margin-top:0; }

input[type=text], textarea {
  width:100%; font-size:16px; padding:10px 12px; border:1px solid var(--border2);
  border-radius:var(--r); background:var(--surface2); color:var(--text);
  font-family:inherit; -webkit-appearance:none;
}
input[type=text]:focus, textarea:focus { outline:2px solid var(--gold); border-color:var(--gold); }
textarea { min-height:70px; resize:vertical; line-height:1.5; }

/* йҮҚгҒҝгӮ№гғ©гӮӨгғҖгғј */
.weight-row { display:flex; align-items:center; gap:12px; margin-top:4px; }
.weight-row input[type=range] {
  flex:1; -webkit-appearance:none; height:4px; border-radius:2px;
  background:linear-gradient(to right, var(--gold) 0%, var(--gold) var(--pct,60%), var(--border2) var(--pct,60%));
  outline:none; cursor:pointer;
}
.weight-row input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:20px; height:20px; border-radius:50%;
  background:var(--gold); border:2px solid var(--bg);
  box-shadow:0 0 8px rgba(245,200,66,0.6);
}
.weight-val { font-size:18px; font-weight:800; color:var(--gold); min-width:24px; text-align:center; }

/* гғҺгҒEгғүгӮ«гғ©гғјйҒёжҠҒE*/
.color-row { display:flex; gap:8px; margin-top:4px; }
.color-swatch {
  width:32px; height:32px; border-radius:50%; cursor:pointer;
  border:2px solid transparent; transition:transform .15s;
}
.color-swatch.active { border-color:#fff; transform:scale(1.15); }

/* AIеҲҒEһҗзөҗжһң */
.ai-result-box {
  background:var(--surface2); border:1px solid var(--border2); border-radius:var(--r);
  padding:14px; font-size:14px; line-height:1.75; margin-top:12px;
  white-space:pre-wrap; display:none;
}
.ai-result-box.visible { display:block; }

/* зү©зҗҒEұӨгӮӨгғігӮёгӮұгғјгӮҝҒEҲгғҺгғјгғүгӮ·гғјгғҲеҒEҒEҒE*/
.physics-box {
  background:var(--surface2); border:1px solid var(--border2); border-radius:var(--r);
  padding:12px 14px; margin-top:8px; font-size:12px; color:var(--text-mid); line-height:1.8;
}
.physics-box b { color:var(--text); }

/* в”Җв”Җ GRAPH SELECTOR в”Җв”Җ */
#graphListWrap { margin-bottom:14px; }
.graph-item {
  display:flex; align-items:center; justify-content:space-between;
  background:var(--surface2); border:1px solid var(--border); border-radius:var(--r);
  padding:12px 14px; margin-bottom:8px; cursor:pointer;
}
.graph-item:active { background:var(--border); }
.graph-item.current { border-color:var(--gold); }
.graph-item-name { font-size:15px; font-weight:600; }
.graph-item-meta { font-size:12px; color:var(--text-dim); margin-top:2px; }
.graph-item-del { background:none; border:none; color:var(--red); font-size:18px; padding:4px 8px; cursor:pointer; }

/* в”Җв”Җ TOAST в”Җв”Җ */
.toast {
  position:fixed; bottom:calc(env(safe-area-inset-bottom)+80px); left:50%;
  transform:translateX(-50%) translateY(12px);
  background:rgba(30,35,46,0.95); color:var(--text); border:1px solid var(--border2);
  border-radius:100px; padding:9px 20px; font-size:13px; font-weight:600;
  z-index:60; opacity:0; transition:opacity .2s, transform .2s;
  white-space:nowrap; pointer-events:none; backdrop-filter:blur(12px);
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* в”Җв”Җ AI LOADING в”Җв”Җ */
#aiLoading {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  z-index:50; background:var(--surface); border:1px solid var(--border2);
  border-radius:16px; padding:20px 28px; font-size:14px; color:var(--text-mid);
  display:none; text-align:center; box-shadow:0 8px 40px rgba(0,0,0,0.6);
}
#aiLoading.show { display:block; }

/* в”Җв”Җ EDGE DELETE HINT в”Җв”Җ */
#edgeHint {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  background:var(--surface); border:1px solid var(--border2); border-radius:14px;
  padding:16px 20px; z-index:25; display:none; text-align:center;
  box-shadow:0 4px 30px rgba(0,0,0,0.5);
}
#edgeHint.show { display:block; }
#edgeHint p { font-size:14px; margin-bottom:12px; color:var(--text-mid); }
#edgeHint button { margin:0 4px; padding:8px 16px; border-radius:8px; border:1px solid var(--border2);
  font-size:14px; font-weight:600; cursor:pointer; }
#edgeDeleteBtn { background:rgba(255,95,95,0.15); color:var(--red); border-color:rgba(255,95,95,0.3); }
#edgeCancelBtn { background:var(--surface2); color:var(--text); }

/* в”Җв”Җ QUICK CAPTURE (гҒҷгҒҗиЁҳйҢІ) в”Җв”Җ */
#quickCaptureFab {
  position:fixed; right:16px; bottom:calc(env(safe-area-inset-bottom)+78px); z-index:22;
  width:58px; height:58px; border-radius:50%;
  background:linear-gradient(145deg, var(--gold), #E0A800);
  color:#1A1400; border:none; font-size:26px; font-weight:800;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 18px rgba(245,200,66,0.45);
  cursor:pointer;
}
#quickCaptureFab:active { transform:scale(0.94); }
#quickCaptureFab.recording {
  background:linear-gradient(145deg, var(--red), #C43A3A);
  box-shadow:0 4px 18px rgba(255,95,95,0.5);
  animation: qc-pulse 1.1s infinite;
}
@keyframes qc-pulse {
  0%,100% { box-shadow:0 4px 18px rgba(255,95,95,0.5); }
  50% { box-shadow:0 4px 30px rgba(255,95,95,0.85); }
}

#quickCaptureBar {
  position:fixed; left:12px; right:12px;
  bottom:calc(env(safe-area-inset-bottom)+10px); z-index:23;
  background:var(--surface); border:1px solid var(--border2);
  border-radius:18px; padding:12px 12px calc(env(safe-area-inset-bottom)+12px);
  box-shadow:0 -6px 30px rgba(0,0,0,0.55);
  transform:translateY(120%); transition:transform .22s ease-out;
}
#quickCaptureBar.open { transform:translateY(0); }
.qc-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.qc-title { font-size:12px; font-weight:800; color:var(--gold); letter-spacing:.04em; }
.qc-close { background:none; border:none; color:var(--text-dim); font-size:14px; padding:4px 6px; cursor:pointer; }
.qc-row { display:flex; align-items:flex-end; gap:8px; }
#qcInput {
  flex:1; min-height:44px; max-height:120px; resize:none;
  font-size:16px; padding:10px 12px; border:1px solid var(--border2);
  border-radius:12px; background:var(--surface2); color:var(--text);
  font-family:inherit; line-height:1.4;
}
#qcInput:focus { outline:2px solid var(--gold); border-color:var(--gold); }
.qc-mic-btn, .qc-send-btn {
  flex-shrink:0; width:44px; height:44px; border-radius:12px; border:1px solid var(--border2);
  background:var(--surface2); color:var(--text); font-size:18px;
  display:flex; align-items:center; justify-content:center; cursor:pointer;
}
.qc-mic-btn.recording { background:rgba(255,95,95,0.18); border-color:var(--red); color:var(--red); animation: qc-pulse 1.1s infinite; }
.qc-send-btn { background:var(--gold); border-color:var(--gold); color:#1A1400; font-weight:800; }
.qc-send-btn:active { background:#E0A800; }
.qc-status { font-size:12px; color:var(--text-dim); margin-top:6px; min-height:16px; }
.qc-status.busy { color:var(--gold); }

/* в”Җв”Җ SYNC SHEET в”Җв”Җ */
.sync-platform-box {
  border:1px solid var(--border2); border-radius:var(--r);
  padding:14px; margin-bottom:12px; background:var(--surface2);
}
.sync-platform-box h3 { font-size:13px; font-weight:800; color:var(--gold); margin-bottom:8px; }
.sync-platform-box p { font-size:12px; color:var(--text-mid); line-height:1.6; margin-bottom:10px; }
.sync-status-line { font-size:12px; color:var(--text-dim); margin-top:8px; }
.sync-btn-row { display:flex; gap:8px; flex-wrap:wrap; }
</style>
</head>
<body>

<!-- CANVAS -->
<canvas id="graphCanvas"></canvas>

<!-- HEADER -->
<header>
  <span class="app-title">в¬Ў flow-mind</span>
  <div class="header-spacer"></div>
  <button class="hdr-btn" id="graphsBtn">рҹ“Ӯ гӮ°гғ©гғҒE/button>
  <button class="hdr-btn" id="syncBtn">вҳҒEёҒE/button>
  <button class="hdr-btn gold" id="analyzeBtn">вңҰ AIеҲҒEһҗ</button>
</header>

<!-- SCORE BAR -->
<div id="scoreBar"></div>

<!-- ATTRACTOR BAR -->
<div id="attractorBar"><span class="attractor-chip" id="attractorChip"><span class="attractor-dot" id="attractorDot"></span><span id="attractorText"></span></span></div>

<!-- MODE LABEL -->
<div id="modeLabel">гӮҝгғҒEҒEгҒ§ж–°гҒ—гҒ„гғҺгҒEгғүгӮ’иҝҪеҠ </div>

<!-- TOOLBAR -->
<div id="toolbar">
  <button class="tool-btn" id="addModeBtn">ҒEҒEиҝҪеҠ </button>
  <button class="tool-btn" id="connectModeBtn">вҶҒEжҺҘз¶ҒE/button>
  <button class="tool-btn" id="editModeBtn">вңҒEз·ЁйӣҒE/button>
  <div class="tool-spacer"></div>
  <button class="tool-btn danger" id="deleteNodeBtn" style="display:none">рҹ—‘ еүҠйҷӨ</button>
  <button class="tool-btn" id="resetViewBtn">вҠҒE/button>
</div>

<!-- OVERLAY -->
<div class="sheet-overlay" id="overlay"></div>

<!-- NODE EDIT SHEET -->
<div class="sheet" id="nodeSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <button id="nodeSheetCancel">гӮӯгғЈгғігӮ»гғ«</button>
    <h2 id="nodeSheetTitle">гғҺгҒEгғүз·ЁйӣҒE/h2>
    <button id="nodeSheetSave" style="color:var(--gold);font-weight:800;">дҝқеӯҒE/button>
  </div>
  <div class="sheet-body">
    <label class="field-label">гғ©гғҷгғ«</label>
    <input type="text" id="nLabel" placeholder="гӮўгӮӨгғҒEӮўгғ»жҰӮеҝөгӮ’еҒEеҠҒE maxlength="40">

    <label class="field-label">гғЎгғў</label>
    <textarea id="nMemo" placeholder="иЈңи¶ігғ»ж №жӢ гҒӘгҒ©ҒEҲд»»ж„ҸпјҒE></textarea>

    <label class="field-label">иҮӘе·ұи©•дҫЎгҒ®йҮҚгҒҝҒEҲзўәдҝЎеәҰҒEҒE/label>
    <div class="weight-row">
      <input type="range" id="nWeight" min="1" max="5" step="1" value="3">
      <span class="weight-val" id="nWeightVal">3</span>
    </div>

    <label class="field-label">гғҺгҒEгғүгӮ«гғ©гғј</label>
    <div class="color-row" id="colorRow">
      <div class="color-swatch active" data-color="#4A9EFF" style="background:#4A9EFF"></div>
      <div class="color-swatch" data-color="#F5C842" style="background:#F5C842"></div>
      <div class="color-swatch" data-color="#4AE09A" style="background:#4AE09A"></div>
      <div class="color-swatch" data-color="#FF5F5F" style="background:#FF5F5F"></div>
      <div class="color-swatch" data-color="#C084FC" style="background:#C084FC"></div>
      <div class="color-swatch" data-color="#FB923C" style="background:#FB923C"></div>
    </div>

    <label class="field-label" style="margin-top:20px;">жҺҘз¶ҡгӮЁгғҒEӮё</label>
    <div id="edgeInfo" style="font-size:13px;color:var(--text-dim);padding:4px 0;"></div>

    <label class="field-label" style="margin-top:20px;">зү©зҗҒEұӨгӮ№гғҒEҒEгӮҝгӮ№</label>
    <div class="physics-box" id="physicsBox">вҖҒE/div>
  </div>
</div>

<!-- AI ANALYSIS SHEET -->
<div class="sheet" id="aiSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <button id="aiSheetClose">й–үгҒҳгӮҒE/button>
    <h2>AI гӮ°гғ©гғ•еҒEжһҒE/h2>
    <span id="aiModelBadge" style="font-size:11px;background:var(--gold-dim);color:var(--gold);border-radius:100px;padding:3px 12px;font-weight:700;"></span>
  </div>
  <div class="sheet-body">
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;">
      <button class="tool-btn" id="aiStructureBtn">рҹ”Қ ж§ӢйҖ еҲҒEһҗ</button>
      <button class="tool-btn" id="aiWeakBtn">вҡ ҒEҒEејұзӮ№жӨңеҒE</button>
      <button class="tool-btn" id="aiSuggestBtn">рҹ’Ў гғҺгҒEгғүжҸҗжЎҒE/button>
      <button class="tool-btn gold" id="aiHonneBtn">рҹ§  жң¬йҹіжҠҪеҮә</button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:10px;">
      <input type="text" id="aiCustomInput" placeholder="гӮ«гӮ№гӮҝгғ иіӘе•ҸвҖҰ" style="flex:1;font-size:15px;">
      <button class="tool-btn gold" id="aiCustomBtn">йҖҒдҝЎ</button>
    </div>
    <div class="ai-result-box" id="aiResultBox"></div>
  </div>
</div>

<!-- GRAPHS LIST SHEET -->
<div class="sheet" id="graphsSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <button id="graphsSheetClose">й–үгҒҳгӮҒE/button>
    <h2>гӮ°гғ©гғ•дёҖиҰ§</h2>
    <button id="newGraphBtn" style="color:var(--gold);font-weight:800;">ҒEҒEж–°иҰҒE/button>
  </div>
  <div class="sheet-body">
    <div id="graphListWrap"></div>
    <div style="margin-top:8px;border-top:1px solid var(--border);padding-top:14px;">
      <button class="tool-btn" id="importTransferBtn" style="width:100%;justify-content:center;">
        рҹ“Ҙ is_transfer гҒӢгӮүеҸ—дҝЎ
      </button>
    </div>
  </div>
</div>

<!-- EDGE DELETE HINT -->
<div id="edgeHint">
  <p id="edgeHintLabel">гҒ“гҒEжҺҘз¶ҡгӮ’еүҠйҷӨгҒ—гҒҫгҒҷгҒӢҒEҒE/p>
  <button id="edgeDeleteBtn">еүҠйҷӨ</button>
  <button id="edgeCancelBtn">гӮӯгғЈгғігӮ»гғ«</button>

// в‘  Hebbianеј·еҢ–е№ҒEјҲеҗҢжҷӮзҷәзҒ«гҒ§conductanceгҒҢдјёгҒігӮӢйҮҸҒEҒEconst HEBBIAN_STEP = 0.04;

// в‘ў еёҜеҹҹгҒ”гҒЁгҒ®иүІгғ»йҖҹеәҰҒEҲеҸҜиҰ–еҢ–з”ЁҒEҒEconst BAND_STYLE = {

  theta: { color:'#C084FC', speed:0.3, label:'ОёжіўҒEҲдёҚе®үгҒEиЁҳжҒEҒEҒE },
  delta: { color:'#4A9EFF', speed:0.18,label:'ОҙжіўҒEҲж·ұгҒҒEғ…еӢ•пјҒE },
};
// в‘Ј attractorеҲӨе®ҡгғҶгғјгғ–гғ«ҒEҲеёҜеҹҒEГҒEеҜҒEәҰ ГҒEжҢҒз¶ҡжҷӮй–ҒEвҶҒEж„ҹжғ…гғ©гғҷгғ«ҒEҒEfunction classifyAttractor(cluster) {
  const { band, density, durationMs, size } = cluster;
  if (size < 2) return null;
  if (band === 'gamma') {
    if (density > 0.6 && durationMs > 2800) return { label:'жҖ’гӮҠ', color:BAND_STYLE.gamma.color };

  }
  if (band === 'beta') {
    return durationMs > 3000 ? { label:'з·Ҡејө', color:BAND_STYLE.beta.color } : { label:'жҖқиҖҒEёӯ', color:BAND_STYLE.beta.color };
  }
  if (band === 'alpha') {
    return { label:'гғӘгғ©гғҒEӮҜгӮ№', color:BAND_STYLE.alpha.color };

  if (band === 'theta') {

  }
  if (band === 'delta') {
    return durationMs > 5000 ? { label:'ж·ұгҒҒEғ…еӢҒE, color:BAND_STYLE.delta.color } : null;
  }
  return null;
}

// Canvas

const ctx = canvas.getContext('2d');

// Viewport transform
let vpX = 0, vpY = 0, vpScale = 1;

// Graph data
let graphs = {};      // { id: { name, nodes:{}, edges:[] } }
let currentGraphId = null;

function currentGraph() { return graphs[currentGraphId] || null; }
function nodes() { return currentGraph()?.nodes || {}; }
function edges() { return currentGraph()?.edges || []; }

// Modes
const MODE = { ADD:'add', CONNECT:'connect', EDIT:'edit' };
let mode = MODE.ADD;
let connectFrom = null;   // nodeId of connect source
let selectedNode = null;  // nodeId
let selectedEdge = null;  // {from,to} index

// Drag
let dragging = null;  // { nodeId, offX, offY }
let isPanning = false;

// Animation

// зҸҫеңЁгҒ®attractorзҠ¶ж…ӢпјҲв‘Ј гӮҜгӮӘгғӘгӮўеұӨҒEҒElet currentAttractor = null;
let currentSyncClusters = [];
// гӮҜгӮӨгғҒEӮҜиЁҳйҢІгҒ®иҮӘеӢ•жҺҘз¶ҡгҒ«дҪҝгҒҒEҖҢзӣҙеүҚгҒ«зҷәзҒ«гҒ—гҒҹгғҺгҒEгғүгҖҒElet lastFiredNodeId = null;

// Node default
const NODE_R = 38;
let editingNodeId = null;
let editingNodeColor = '#4A9EFF';

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•ҒE// FLOWCHART LAYOUT вҖҒEеёёжҷӮгҖҒж§ӢйҖ еҢ–гҒ•гӮҢгҒҹдёҠвҒEдёӢгҒEгғ¬гӮӨгӮўгӮҰгғҲгҒ«ж•ҙеҲ—гҒ•гҒӣгӮӢ
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•ҒE// гӮЁгғҒEӮёгҒ®еҗ‘гҒҚ(fromвҶ’to)гӮ’дҪҝгҒЈгҒҰеҗҒEғҺгғјгғүгҒEгҖҢйҡҺеұӨ(level)гҖҚгӮ’жұәгӮҒгҖҒE// еҗҢгҒҳйҡҺеұӨгҒ®гғҺгҒEгғүгҒEжЁӘгҒ«дёҰгҒ№гӮӢгҖӮгғ«гғјгғҒEеҫӘз’°)гҒҢгҒӮгӮӢе ҙеҗҲгҒEгҖҒгҒқгҒ“гҒ гҒҒE// жңӘзўәе®ҡгҒEгҒҫгҒҫж®ӢгӮӢгҒ®гҒ§гҖҒжңҖеҫҢгҒ«гҒҫгҒЁгӮҒгҒҰжң«е°ҫгҒ®йҡҺеұӨгҒёй…ҚзҪ®гҒҷгӮӢгҖҒEfunction applyFlowchartLayout() {
  const g = currentGraph();
  if (!g) return;
  const ids = Object.keys(g.nodes);
  if (ids.length === 0) return;

  const inDeg = {};
  ids.forEach(id => { inDeg[id] = 0; });
  g.edges.forEach(e => { if (inDeg[e.to] !== undefined) inDeg[e.to]++; });

  const outAdj = {};
  ids.forEach(id => { outAdj[id] = []; });
  g.edges.forEach(e => { if (outAdj[e.from]) outAdj[e.from].push(e.to); });

  const level = {};
  const queue = [];
  ids.forEach(id => { if (inDeg[id] === 0) { level[id] = 0; queue.push(id); } });

  const inDegWork = Object.assign({}, inDeg);
  let qi = 0;
  while (qi < queue.length) {
    const cur = queue[qi++];
    outAdj[cur].forEach(nb => {
      level[nb] = Math.max(level[nb] !== undefined ? level[nb] : 0, level[cur] + 1);
      inDegWork[nb]--;
      if (inDegWork[nb] === 0 && level[nb] !== undefined && !queue.includes(nb)) queue.push(nb);
    });
  }

  // еҫӘз’°гҒӘгҒ©гҒ§жңӘзўәе®ҡгҒEгҒҫгҒҫж®ӢгҒЈгҒҹгғҺгғјгғүгҒEгҖҒжңҖеӨ§йҡҺеұӨгҒ®ж¬ЎгҒ«гҒҫгҒЁгӮҒгҒҰй…ҚзҪ®
  let maxLevel = 0;
  Object.values(level).forEach(l => { if (l > maxLevel) maxLevel = l; });
  ids.forEach(id => { if (level[id] === undefined) { maxLevel++; level[id] = maxLevel; } });

  // йҡҺеұӨгҒ”гҒЁгҒ«гӮ°гғ«гғјгғ”гғігӮ°гҒ—гҒҰжЁӘгҒ«дёҰгҒ№гӮҒE  const byLevel = {};
  ids.forEach(id => {
    const l = level[id];
    (byLevel[l] = byLevel[l] || []).push(id);
  });

  const LEVEL_SPACING = 190; // дёҠдёӢгҒEй–“йҡ”
  const NODE_SPACING = 130;  // еҗҢйҡҺеұӨеҶҒEҒEе·ҰеҸій–“йҡ”

  Object.keys(byLevel).map(Number).sort((a,b) => a-b).forEach(lvl => {
    const row = byLevel[lvl];
    row.forEach((id, i) => {
      const n = g.nodes[id];
      n.x = (i - (row.length - 1) / 2) * NODE_SPACING;
      n.y = lvl * LEVEL_SPACING;
    });
  });
}

    graphs = cloudData;
    localStorage.setItem("fm_graphs", JSON.stringify(graphs));
    localStorage.setItem("fm_cloud_last", String(cloudTs));
    const ids = Object.keys(graphs);
    if (ids.length > 0) { currentGraphId = ids[0]; }
    renderAll();
    setTimeout(loadFromCloud, 800);
    showToast("?? ғNғүғEғhӮ©Ӯз•ңҢіӮөӮЬӮөӮҪ");
  });
}

function saveGraphs() {
  try { localStorage.setItem(LS_GRAPHS, JSON.stringify(graphs)); } catch(e) { showToast('дҝқеӯҳе®№йҮҸгҒҢдёҚи¶ігҒ—гҒҰгҒҒEҒҫгҒҒE); }
  // Windows/PC гҒ§гғ•гӮ©гғ«гғҖжҺҘз¶ҡжёҲгҒҝгҒӘгӮүиҒEеӢ•гҒ§iCloud DriveгҒёгӮӮжӣёгҒҚиҫјгӮҖҒEҲгғҮгғҗгӮҰгғігӮ№жёҲгҒҝгғ»жңӘжҺҘз¶ҡгҒӘгӮүдҪ•гӮӮгҒ—гҒӘгҒҒEјҒE  if (window.SyncBridge) SyncBridge.autoSave('flow-mind', graphs);
  // гӮҜгғ©гӮҰгғҒEе…Ёз«Ҝжң«е…ұйҖҒEгҒҢиЁӯе®ҡжёҲгҒҝгҒӘгӮүгҒқгҒЎгӮүгҒ«гӮӮиҒEеӢ•жӣёгҒҚиҫјгҒҝ
  if (window.CloudSync) CloudSync.cloudSave('flow-mind', graphs);
}

function loadGraphs() {
  try {
    const raw = localStorage.getItem(LS_GRAPHS);
    graphs = raw ? JSON.parse(raw) : {};
    currentGraphId = localStorage.getItem(LS_CURRENT) || null;
    if (!currentGraphId || !graphs[currentGraphId]) {
      // гғҒEғ•гӮ©гғ«гғҲгӮ°гғ©гғ•дҪңжҒE
      createGraph('гҒҜгҒҳгӮҒгҒҰгҒ®гӮ°гғ©гғҒE);
    }
  } catch(e) { graphs = {}; createGraph('гӮ°гғ©гғҒE'); }
}

function createGraph(name) {
  const id = uid();
  graphs[id] = { name, nodes:{}, edges:[], createdAt: Date.now() };
  currentGraphId = id;
  localStorage.setItem(LS_CURRENT, id);
  saveGraphs();
  return id;
}

function switchGraph(id) {
  currentGraphId = id;
  localStorage.setItem(LS_CURRENT, id);
  connectFrom = null; selectedNode = null;
  lastFiredNodeId = null;
  applyFlowchartLayout();
  centerView();
  updateScoreBar();
  renderGraphList();
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•ҒE// PAGE RANK вҖҒEйҮҚиҰҒеәҰгӮ№гӮігӮўиЁҲз®ҒE// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•ҒEfunction computeScores() {
  const g = currentGraph();
  if (!g) return {};
  const nids = Object.keys(g.nodes);
  if (nids.length === 0) return {};

  // еҲқжңҹгӮ№гӮігӮў = иҮӘе·ұйҮҚгҒҝ
  const scores = {};
  nids.forEach(id => { scores[id] = g.nodes[id].weight || 3; });

  // еҸҚеҫ©ҒEҒEеӣһпјҒE  for (let iter = 0; iter < 3; iter++) {
    const next = {};
    nids.forEach(id => { next[id] = g.nodes[id].weight || 3; }); // иҮӘе·ұйҮҚгҒҝгҒҢгҒEгғјгӮ№
    g.edges.forEach(e => {
      const w = e.weight || 1;
      // toгғҺгҒEгғүгҒEfromгғҺгҒEгғүгҒEгӮ№гӮігӮўгӮ’еҸ—гҒ‘еҸ–гӮҒE      if (next[e.to] !== undefined && scores[e.from] !== undefined) {
        next[e.to] += scores[e.from] * w * 0.4;
      }
    });
    Object.assign(scores, next);
  }

  // жӯЈиҰҸеҢ– [0..1]
  const max = Math.max(...Object.values(scores));
  if (max > 0) nids.forEach(id => { scores[id] = scores[id] / max; });
  return scores;
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•ҒE// в‘  в‘Ў ж„ҹжғ…гҒ®зү©зҗҒEғўгғҒEғ« вҖҒEйӣ»иҚ·гҒ®жөҒгӮҢгҒЁдјқж’ӯ
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•ҒE// гғҺгҒEгғүгӮ’гҖҢзҷәзҒ«гҖҚгҒ•гҒӣгӮӢҒEҲгӮҝгғҒEҒEҒEқжҙ»еӢ•йӣ»дҪҚгҒEзҷәз”ҹпјҒEfunction fireNode(id) {
  const g = currentGraph();
  const n = g?.nodes[id];
  if (!n) return;

  ensurePhysicsFields(n);
  const now = Date.now();

  // в‘  зҷәзҒ«еұҘжӯҙгӮ’иЁҳйҢІҒEҲзӣҙиҝҒEд»¶гҒҫгҒ§дҝқжҢҒҒEҒE  n.fireHistory.push(now);
  if (n.fireHistory.length > 8) n.fireHistory.shift();
  n.lastFired = now;
  n.charge = Math.min(1, n.charge + FIRE_CHARGE_BOOST);
  lastFiredNodeId = id;

  // в‘Ў йӣ»жөҒгҒҢжөҒгӮҢгӮҒEвҶҒEйҡЈжҺҘгғҺгҒEгғүгҒёйӣ»е ҙгғ»зЈҒе ҙгҒ®гӮҲгҒҶгҒ«дјқж’ӯ
  const outEdges = g.edges.filter(e => e.from === id || e.to === id);
  outEdges.forEach(e => {
    ensureEdgePhysics(e);
    const otherId = e.from === id ? e.to : e.from;
    const other = g.nodes[otherId];
    if (!other) return;
    ensurePhysicsFields(other);

    const transferred = n.charge * (e.weight || 1) * e.conductance * PROPAGATION_FACTOR;
    other.charge = Math.min(1, other.charge + transferred);

    // в‘  еҗҢжҷӮзҷәзҒ«гҒ—гҒҰгҒҒEҒҹгӮЁгғҒEӮёгҒҜдјқе°ҺзҺҮҒEҲгӮ·гғҠгҒEгӮ№еј·еәҰҒEүгӮ’еј·еҢ–пјқHebbian learning
    const otherRecentlyFired = other.lastFired && (now - other.lastFired < SYNC_WINDOW_MS);
    if (otherRecentlyFired) {
      e.conductance = Math.min(2, e.conductance + HEBBIAN_STEP);
    }
  });

  saveGraphs();
}

function ensurePhysicsFields(n) {
  if (n.charge === undefined) n.charge = 0;
  if (!n.fireHistory) n.fireHistory = [];
  if (n.lastFired === undefined) n.lastFired = 0;
}
function ensureEdgePhysics(e) {
  if (e.conductance === undefined) e.conductance = 1.0;
}

// charge гҒ®жҷӮй–“жёӣиЎ°ҒEҲгғ•гғ¬гғјгғ гҒ”гҒЁгҒ«е‘јгҒ¶ҒEҒEfunction decayCharges(dtMs) {
  const g = currentGraph();
  if (!g) return;
  const decayFactor = Math.exp(-dtMs / CHARGE_DECAY_TAU);
  Object.values(g.nodes).forEach(n => {
    if (n.charge) n.charge *= decayFactor;
    if (n.charge < 0.01) n.charge = 0;
  });
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•ҒE// в‘ў зҘһзөҢгғҚгғҒEғҲгғҜгғјгӮҜгҒ®еҗҢжңҹжӨңеҒEҒEҲгӮігғ’гҒEгғ¬гғігӮ№ҒEҒE// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•ҒEfunction estimateFreqBand(n) {
  const h = n.fireHistory;
  if (!h || h.length < 2) return null;
  // зӣҙиҝ‘гҒEзҷәзҒ«й–“йҡ”гҒ®е№іеқҒEјҒEsҒEҒEвҶҒEз–‘дјје‘Ёжіўж•°ҒEҒEzҒEүгҒ«еӨүжҸӣ
  const recent = h.slice(-4);
  let totalGap = 0, count = 0;
  for (let i = 1; i < recent.length; i++) {
    totalGap += recent[i] - recent[i-1];
    count++;
  }
  if (count === 0) return null;
  const avgGapMs = totalGap / count;
  if (avgGapMs <= 0) return null;
  const freqHz = 1000 / avgGapMs;
  if (freqHz >= BAND_THRESH.gamma) return 'gamma';
  if (freqHz >= BAND_THRESH.beta)  return 'beta';
  if (freqHz >= BAND_THRESH.alpha) return 'alpha';
  if (freqHz >= BAND_THRESH.theta) return 'theta';
  return 'delta';
}

// жҷӮй–“зӘ“еҒEгҒ«зҷәзҒ«гҒ—гҒҰгҒҒEҒҰгҖҒдә’гҒ„гҒ«йҖЈзөҗгҒ—гҒҰгҒҒEӮӢгғҺгҒEгғүзҫӨгӮ’гӮҜгғ©гӮ№гӮҝеҢҒEfunction detectSyncClusters() {
  const g = currentGraph();
  if (!g) return [];
  const now = Date.now();
  const activeIds = Object.keys(g.nodes).filter(id => {
    const n = g.nodes[id];
    return n.lastFired && (now - n.lastFired < SYNC_WINDOW_MS);
  });
  if (activeIds.length === 0) return [];

  // йҡЈжҺҘгғһгғғгғҒE  const adj = {};
  activeIds.forEach(id => adj[id] = []);
  g.edges.forEach(e => {
    if (adj[e.from] && activeIds.includes(e.to)) adj[e.from].push(e.to);
    if (adj[e.to] && activeIds.includes(e.from)) adj[e.to].push(e.from);
  });

  // йҖЈзөҗжҒEеҲҒEӮ’жҺўзҙў
  const visited = new Set();
  const clusters = [];
  activeIds.forEach(start => {
    if (visited.has(start)) return;
    const stack = [start];
    const comp = [];
    while (stack.length) {
      const cur = stack.pop();
      if (visited.has(cur)) continue;
      visited.add(cur);
      comp.push(cur);
      (adj[cur]||[]).forEach(nb => { if (!visited.has(nb)) stack.push(nb); });
    }
    if (comp.length === 0) return;

    // еёҜеҹҹгӮ’еӨҡж•°жұәгҒ§жұәе®ҒE    const bandCounts = {};
    let earliestFire = Infinity, latestFire = 0;
    comp.forEach(id => {
      const n = g.nodes[id];
      const band = estimateFreqBand(n) || 'delta';
      bandCounts[band] = (bandCounts[band]||0) + 1;
      earliestFire = Math.min(earliestFire, n.fireHistory[0] || n.lastFired);
      latestFire = Math.max(latestFire, n.lastFired);
    });
    const band = Object.entries(bandCounts).sort((a,b)=>b[1]-a[1])[0][0];
    const density = comp.length / activeIds.length;
    const durationMs = latestFire - earliestFire;

    clusters.push({ nodeIds: comp, band, density, durationMs, size: comp.length });
  });

  return clusters.filter(c => c.size >= 2); // еҚҳзӢ¬гғҺгҒEгғүгҒEгӮҜгғ©гӮ№гӮҝгҒЁгҒҝгҒӘгҒ•гҒӘгҒҒE}

function updateAttractorState() {
  currentSyncClusters = detectSyncClusters();
  if (currentSyncClusters.length === 0) { currentAttractor = null; updateAttractorBar(); return; }
  // жңҖеӨ§гӮҜгғ©гӮ№гӮҝгӮ’д»ЈиЎЁattractorгҒЁгҒ—гҒҰжҺЎз”Ё
  const main = currentSyncClusters.sort((a,b)=>b.size-a.size)[0];
  currentAttractor = classifyAttractor(main);
  updateAttractorBar();
}

function updateAttractorBar() {
  const chip = document.getElementById('attractorChip');
  const dot  = document.getElementById('attractorDot');
  const text = document.getElementById('attractorText');
  if (!currentAttractor) { chip.classList.remove('show'); return; }
  chip.classList.add('show');
  chip.style.color = currentAttractor.color;
  chip.style.borderColor = currentAttractor.color + '55';
  chip.style.background = currentAttractor.color + '15';
  dot.style.background = currentAttractor.color;
  text.textContent = currentAttractor.label;
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•ҒE// CANVAS RENDER
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•ҒEfunction resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

function worldToScreen(wx, wy) {
  return { x: wx * vpScale + vpX, y: wy * vpScale + vpY };
}
function screenToWorld(sx, sy) {
  return { x: (sx - vpX) / vpScale, y: (sy - vpY) / vpScale };
}

function centerView() {
  const g = currentGraph();
  if (!g) return;
  const nids = Object.keys(g.nodes);
  if (nids.length === 0) { vpX = canvas.width/2; vpY = canvas.height/2; vpScale = 1; return; }
  let minX=Infinity, maxX=-Infinity, minY=Infinity, maxY=-Infinity;
  nids.forEach(id => {
    const n = g.nodes[id];
    minX = Math.min(minX, n.x); maxX = Math.max(maxX, n.x);
    minY = Math.min(minY, n.y); maxY = Math.max(maxY, n.y);
  });
  const cx = (minX+maxX)/2, cy = (minY+maxY)/2;
  const margin = 120;
  const scaleX = (canvas.width - margin*2) / Math.max(maxX-minX, 1);
  const scaleY = (canvas.height - margin*2) / Math.max(maxY-minY, 1);
  vpScale = Math.min(Math.min(scaleX, scaleY), 1.2);
  vpX = canvas.width/2 - cx * vpScale;
  vpY = canvas.height/2 - cy * vpScale;
}

function drawArrow(x1, y1, x2, y2, color, weight, glow) {
  const dx = x2-x1, dy = y2-y1;
  const len = Math.sqrt(dx*dx+dy*dy);
  if (len < 1) return;
  const ux = dx/len, uy = dy/len;
  // зҹўеҚ°гҒ®е…Ҳз«ҜгӮ’гғҺгғјгғүз«ҜгҒҫгҒ§зё®гӮҒгӮӢ
  const r = NODE_R * vpScale;
  const ex = x2 - ux*r, ey = y2 - uy*r;
  const sx = x1 + ux*r, sy = y1 + uy*r;

  ctx.save();
  ctx.globalAlpha = glow ? 0.9 : 0.55;
  ctx.strokeStyle = color;
  ctx.lineWidth = (1 + weight * 0.7) * vpScale;
  ctx.lineCap = 'round';
  if (glow) {
    ctx.shadowColor = color;
    ctx.shadowBlur = 8;
  }
  ctx.beginPath();
  ctx.moveTo(sx, sy);
  ctx.lineTo(ex, ey);
  ctx.stroke();

  // зҹўеҚ°гғҳгғғгғҒE  const hs = 10 * vpScale;
  const angle = Math.atan2(ey-sy, ex-sx);
  ctx.fillStyle = color;
  ctx.shadowBlur = glow ? 8 : 0;
  ctx.beginPath();
  ctx.moveTo(ex, ey);
  ctx.lineTo(ex - hs*Math.cos(angle-0.4), ey - hs*Math.sin(angle-0.4));
  ctx.lineTo(ex - hs*Math.cos(angle+0.4), ey - hs*Math.sin(angle+0.4));
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawEdgeWeight(x1, y1, x2, y2, w) {
  const mx = (x1+x2)/2, my = (y1+y2)/2;
  ctx.save();
  ctx.fillStyle = 'rgba(245,200,66,0.9)';
  ctx.font = `bold ${11*vpScale}px -apple-system`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(`ГҒE{w}`, mx, my - 10*vpScale);
  ctx.restore();
}

// в‘Ў йӣ»жөҒгҒҢжөҒгӮҢгҒҰгҒҒEӮӢж§ҳеӯҗгӮ’зӨәгҒҷгғ‘гғ«гӮ№ҒEҲгӮЁгғҒEӮёдёҠгӮ’жөҒгӮҢгӮӢеҒEзӮ№ҒEҒEfunction drawCurrentPulse(x1, y1, x2, y2, charge, color) {
  if (charge < 0.05) return;
  const t = (Date.now() % 900) / 900;
  const px = x1 + (x2-x1) * t;
  const py = y1 + (y2-y1) * t;
  ctx.save();
  ctx.globalAlpha = Math.min(1, charge);
  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.arc(px, py, 3.5 * vpScale, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawNode(n, id, score, phase) {
  const s = worldToScreen(n.x, n.y);
  const r = NODE_R * vpScale;
  const isSel = selectedNode === id;
  const isConnFrom = connectFrom === id;
  const glowAmt = score * (0.5 + 0.5 * Math.sin(phase + (n.x+n.y)*0.01));

  ctx.save();

  // гӮ°гғӯгғј
  if (glowAmt > 0.3 || isSel || isConnFrom) {
    ctx.shadowColor = isConnFrom ? '#F5C842' : (isSel ? '#fff' : n.color || '#4A9EFF');
    ctx.shadowBlur = 8 + glowAmt * 24;
  }

  // еӨ–гғӘгғігӮ°ҒEҲйҒёжҠһгҒEжҺҘз¶ҡпјҒE  if (isSel || isConnFrom) {
    ctx.beginPath();
    ctx.arc(s.x, s.y, r + 5*vpScale, 0, Math.PI*2);
    ctx.strokeStyle = isConnFrom ? '#F5C842' : 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 2*vpScale;
    ctx.stroke();
  }

  // жң¬дҪҒE  const grad = ctx.createRadialGradient(s.x - r*0.3, s.y - r*0.3, r*0.1, s.x, s.y, r);
  const col = n.color || '#4A9EFF';
  grad.addColorStop(0, col + 'CC');
  grad.addColorStop(1, col + '55');
  ctx.beginPath();
  ctx.arc(s.x, s.y, r, 0, Math.PI*2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = col + 'AA';
  ctx.lineWidth = 1.5*vpScale;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // в‘  йӣ»иҚ·гғӘгғігӮ°ҒEҒEhargeйҮҸгӮ’еҶҒEҒEгҒ®е…үијӘгҒ§иЎЁзҸҫҒEҒE  if (n.charge > 0.03) {
    ctx.beginPath();
    ctx.arc(s.x, s.y, r * 0.7, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(255,255,255,${n.charge * 0.7})`;
    ctx.lineWidth = 2 * vpScale;
    ctx.stroke();
  }

  // гӮ№гӮігӮўгғӘгғігӮ°ҒEҲйҮҚиҰҒеәҰҒEҒE  if (score > 0) {
    const pct = score;
    ctx.beginPath();
    ctx.arc(s.x, s.y, r + 3*vpScale, -Math.PI/2, -Math.PI/2 + Math.PI*2*pct);
    ctx.strokeStyle = `rgba(245,200,66,${0.4 + pct*0.5})`;
    ctx.lineWidth = 3*vpScale;
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  // гғ©гғҷгғ«
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const fs = Math.max(10, Math.min(14, 12)) * vpScale;
  ctx.font = `700 ${fs}px -apple-system`;
  const maxW = r * 1.6;
  const label = n.label || '?';
  // жҠҳгӮҠиҝ”гҒ—
  const words = label.split('');
  const lineH = fs * 1.3;
  const lines = [];
  let cur = '';
  for (const ch of words) {
    if (ctx.measureText(cur+ch).width > maxW) { lines.push(cur); cur = ch; }
    else cur += ch;
  }
  if (cur) lines.push(cur);
  const totalH = lines.length * lineH;
  lines.forEach((line, i) => {
    ctx.fillText(line, s.x, s.y - totalH/2 + lineH*(i+0.5));
  });

  // йҮҚгҒҝгғҗгғғгӮё
  const badge = `W${n.weight||3}`;
  ctx.font = `600 ${9*vpScale}px -apple-system`;
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.fillText(badge, s.x, s.y + r * 0.7);

  ctx.restore();
}

// в‘ўв‘Ј еҗҢжңҹгӮҜгғ©гӮ№гӮҝгҒ®жіўзҙӢгӮЁгғ•гӮ§гӮҜгғҲпјҲОіжіўйўЁгғӘгғігӮ°ҒEүвҖҒEattractorгҒ®еҸҜиҰ–еҢ–
function drawSyncRipples(phase) {
  if (!currentSyncClusters.length) return;
  const g = currentGraph();
  if (!g) return;

  currentSyncClusters.forEach(cluster => {
    const style = BAND_STYLE[cluster.band] || BAND_STYLE.delta;
    // гӮҜгғ©гӮ№гӮҝгҒ®йҮҚеҝҒE    let cx = 0, cy = 0;
    cluster.nodeIds.forEach(id => {
      const n = g.nodes[id];
      cx += n.x; cy += n.y;
    });
    cx /= cluster.nodeIds.length; cy /= cluster.nodeIds.length;
    const center = worldToScreen(cx, cy);

    // еҗҒEғҺгғјгғүгӮ’еҢҒEҒEжіўзҙӢгӮ’еҖӢеҲҘгҒ«жҸҸгҒҸ
    cluster.nodeIds.forEach(id => {
      const n = g.nodes[id];
      const s = worldToScreen(n.x, n.y);
      const baseR = NODE_R * vpScale;
      for (let i = 0; i < 3; i++) {
        const ringPhase = (phase * style.speed * 3 + i * 0.9) % 3;
        const ringR = baseR + ringPhase * 22 * vpScale;
        const alpha = Math.max(0, 1 - ringPhase / 3) * 0.5 * cluster.density;
        if (alpha <= 0.01) continue;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = style.color;
        ctx.lineWidth = 1.6 * vpScale;
        ctx.beginPath();
        ctx.arc(s.x, s.y, ringR, 0, Math.PI*2);
        ctx.stroke();
        ctx.restore();
      }
    });

    // гӮҜгғ©гӮ№гӮҝе…ЁдҪ“гӮ’еӣІгӮҖи–ҒEҒ„еёҜеҹҹгғ©гғҷгғ«
    if (cluster.nodeIds.length >= 2 && vpScale > 0.4) {
      ctx.save();
      ctx.globalAlpha = 0.85;
      ctx.fillStyle = style.color;
      ctx.font = `700 ${11*vpScale}px -apple-system`;
      ctx.textAlign = 'center';
      ctx.fillText(style.label, center.x, center.y - NODE_R*vpScale - 26*vpScale);
      ctx.restore();
    }
  });
}

function render(now) {
  const dt = now ? (now - lastFrameTime) : 16;
  lastFrameTime = now || performance.now();

  resizeCanvas();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  glowPhase += 0.04;

  const g = currentGraph();
  if (!g) { animFrame = requestAnimationFrame(render); return; }

  // в‘  йӣ»иҚ·гҒ®иҮӘз„¶жёӣиЎ°
  decayCharges(dt);

  const scores = computeScores();

  // Draw edges
  g.edges.forEach(e => {
    const from = g.nodes[e.from], to = g.nodes[e.to];
    if (!from || !to) return;
    ensureEdgePhysics(e);
    const fs = worldToScreen(from.x, from.y);
    const ts = worldToScreen(to.x, to.y);
    const isSel = selectedEdge && selectedEdge.from===e.from && selectedEdge.to===e.to;
    const col = isSel ? '#FF5F5F' : (from.color || '#4A9EFF');
    drawArrow(fs.x, fs.y, ts.x, ts.y, col, e.weight||1, isSel);
    if (vpScale > 0.5) drawEdgeWeight(fs.x, fs.y, ts.x, ts.y, e.weight||1);
    // в‘Ў йӣ»жөҒгғ‘гғ«гӮ№ҒEҒEromгҒ«йӣ»иҚ·гҒҢд№—гҒЈгҒҰгҒҒEӮҢгҒ°жөҒгӮҢгҒҰиҰӢгҒҲгӮӢпјҒE    drawCurrentPulse(fs.x, fs.y, ts.x, ts.y, from.charge||0, col);
  });

  // жҺҘз¶ҡгғўгғјгғүдёӯгҒ®гғ—гғ¬гғ“гғҘгғјгғ©гӮӨгғі
  if (mode === MODE.CONNECT && connectFrom && g.nodes[connectFrom]) {
    // drawn dynamically in pointermove вҖҒEskip here
  }

  // в‘ўв‘Ј еҗҢжңҹжіўзҙӢпјҲгғҺгғјгғүгӮҲгӮҠеҒEгҒ«жҸҸгҒ„гҒҰгҖҒгғҺгғјгғүгҒҢдёҠгҒ«д№—гӮӢгӮҲгҒҶгҒ«ҒEҒE  drawSyncRipples(glowPhase);

  // Draw nodes
  Object.entries(g.nodes).forEach(([id, n]) => {
    ensurePhysicsFields(n);
    drawNode(n, id, scores[id] || 0, glowPhase);
  });

  animFrame = requestAnimationFrame(render);
}

// attractorзҠ¶ж…ӢгҒEжҸҸз”»гғ«гғјгғ—гҒЁгҒҜеҲҘгҒ®и»ҪгҒҒE‘ЁжңҹгҒ§еҶҚиЁҲз®—пјҲйҮҚгҒҒEҒEзҗҒEҒ§гҒҜгҒӘгҒҒEҒҢй »еәҰгӮ’жҠ‘гҒҲгӮӢҒEҒEsetInterval(updateAttractorState, 500);

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•ҒE// SCORE BAR
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•ҒEfunction updateScoreBar() {
  const scores = computeScores();
  const g = currentGraph();
  if (!g) return;
  const sorted = Object.entries(scores)
    .filter(([id]) => g.nodes[id])
    .sort((a,b) => b[1]-a[1])
    .slice(0, 5);

  const bar = document.getElementById('scoreBar');
  bar.innerHTML = sorted.map(([id, sc]) => {
    const n = g.nodes[id];
    const pct = Math.round(sc * 100);
    const col = n.color || '#4A9EFF';
    return `<span class="score-chip" style="color:${col};border-color:${col}40;background:${col}18;">
      ${n.label || '?'} ${pct}%
    </span>`;
  }).join('');
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•ҒE// INPUT HANDLING
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•ҒEfunction getPos(e) {
  const r = canvas.getBoundingClientRect();
  if (e.touches) {
    return { x: e.touches[0].clientX - r.left, y: e.touches[0].clientY - r.top };
  }
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

function hitNode(sx, sy) {
  const g = currentGraph();
  if (!g) return null;
  const w = screenToWorld(sx, sy);
  const r = NODE_R;
  for (const [id, n] of Object.entries(g.nodes)) {
    const dx = n.x - w.x, dy = n.y - w.y;
    if (dx*dx + dy*dy < r*r) return id;
  }
  return null;
}

function hitEdge(sx, sy) {
  const g = currentGraph();
  if (!g) return null;
  const w = screenToWorld(sx, sy);
  const thresh = 18 / vpScale;
  for (const e of g.edges) {
    const fn = g.nodes[e.from], tn = g.nodes[e.to];
    if (!fn || !tn) continue;
    const dx = tn.x - fn.x, dy = tn.y - fn.y;
    const len = Math.sqrt(dx*dx+dy*dy);
    if (len < 1) continue;
    const t = Math.max(0, Math.min(1, ((w.x-fn.x)*dx+(w.y-fn.y)*dy)/(len*len)));
    const px = fn.x + t*dx - w.x, py = fn.y + t*dy - w.y;
    if (Math.sqrt(px*px+py*py) < thresh) return e;
  }
  return null;
}

// Pointer events
let pointerDown = false;
let pointerMoved = false;
let pointerStartPos = { x:0, y:0 };

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  pointerDown = true;
  pointerMoved = false;
  const pos = getPos(e);
  pointerStartPos = pos;

  const hitN = hitNode(pos.x, pos.y);

  if (mode === MODE.EDIT) {
    if (hitN) { selectedNode = hitN; }
    else {
      const hitE = hitEdge(pos.x, pos.y);
      if (hitE) { selectedEdge = hitE; showEdgeHint(hitE); }
      else { selectedNode = null; selectedEdge = null; }
    }
    document.getElementById('deleteNodeBtn').style.display = selectedNode ? '' : 'none';
  } else if (mode === MODE.CONNECT) {
    if (hitN) connectFrom = hitN;
  } else {
    // ADD modeҒEҲгғүгғ©гғҒEӮ°з§»еӢ•гҒEз„ЎеҠ№гҖӮиҒEеӢ•гғ¬гӮӨгӮўгӮҰгғҲгҒҢдҪҚзҪ®гӮ’з®ЎзҗҒEҒҷгӮӢгҒҹгӮҒEјҒE    if (hitN) { selectedNode = hitN; }
  }
});

canvas.addEventListener('pointermove', e => {
  if (!pointerDown) return;
  const pos = getPos(e);
  const dx = pos.x - pointerStartPos.x, dy = pos.y - pointerStartPos.y;
  if (Math.sqrt(dx*dx+dy*dy) > 4) pointerMoved = true;

  if (dragging) {
    const w = screenToWorld(pos.x, pos.y);
    const g = currentGraph();
    if (g && g.nodes[dragging.nodeId]) {
      g.nodes[dragging.nodeId].x = w.x;
      g.nodes[dragging.nodeId].y = w.y;
    }
  } else if (!dragging && pointerMoved && !connectFrom) {
    // pan
    vpX += pos.x - (pointerStartPos.x + (pointerMoved ? 0 : dx));
    vpY += pos.y - (pointerStartPos.y + (pointerMoved ? 0 : dy));
    pointerStartPos = pos;
  }
});

canvas.addEventListener('pointerup', e => {
  if (!pointerDown) return;
  pointerDown = false;
  const pos = getPos(e);
  const hitN = hitNode(pos.x, pos.y);

  if (dragging) {
    saveGraphs();
    updateScoreBar();
    dragging = null;
    return;
  }

  if (!pointerMoved) {
    // TAP
    if (mode === MODE.ADD) {
      if (!hitN) {
        // ж–°иҰҸгғҺгғјгғүиҝҪеҠ 
        const w = screenToWorld(pos.x, pos.y);
        addNode(w.x, w.y);
      } else {
        // в‘  гӮҝгғҒEҒEҒEқзҷәзҒ«ҒEҲйӣ»иҚ·гӮ’жөҒгҒҷҒEүгҒ—гҒҰгҒӢгӮүгғҺгҒEгғүз·ЁйӣҒEӮ’й–ӢгҒҸ
        fireNode(hitN);
        openNodeSheet(hitN);
      }
    } else if (mode === MODE.CONNECT) {
      if (connectFrom && hitN && hitN !== connectFrom) {
        addEdge(connectFrom, hitN);
        connectFrom = null;
      } else if (hitN) {
        connectFrom = hitN;
        fireNode(hitN);
      } else {
        connectFrom = null;
      }
    } else if (mode === MODE.EDIT) {
      if (hitN) { fireNode(hitN); openNodeSheet(hitN); }
    }
  }
  dragging = null;
});

// Pinch zoom
let lastPinchDist = 0;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 2) lastPinchDist = pinchDist(e);
}, { passive:true });
canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 2) {
    const dist = pinchDist(e);
    const ratio = dist / lastPinchDist;
    const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    vpX = cx - (cx - vpX) * ratio;
    vpY = cy - (cy - vpY) * ratio;
    vpScale = Math.max(0.3, Math.min(3, vpScale * ratio));
    lastPinchDist = dist;
    e.preventDefault();
  }
}, { passive:false });

function pinchDist(e) {
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  return Math.sqrt(dx*dx+dy*dy);
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•ҒE// NODE / EDGE OPERATIONS
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•ҒEfunction addNode(wx, wy) {
  const g = currentGraph();
  if (!g) return;
  const id = uid();
  g.nodes[id] = {
    id, label:'ж–°гҒ—гҒ„гғҺгҒEгғҒE,
    x: wx, y: wy,
    weight: 3,
    color: '#4A9EFF',
    memo: '',
    charge: 0,
    fireHistory: [],
    lastFired: 0,
  };
  applyFlowchartLayout();
  saveGraphs();
  updateScoreBar();
  openNodeSheet(id, true);
}

function addEdge(from, to) {
  const g = currentGraph();
  if (!g) return;
  // йҮҚиӨҒEғҒгӮ§гғҒEӮҜ
  if (g.edges.find(e => e.from===from && e.to===to)) { showToast('гҒҷгҒ§гҒ«жҺҘз¶ҡжёҲгҒҝгҒ§гҒҒE); return; }
  g.edges.push({ from, to, weight:1, conductance:1.0 });
  applyFlowchartLayout();
  saveGraphs();
  updateScoreBar();
  showToast('жҺҘз¶ҡгҒ—гҒҫгҒ—гҒҹ');
}

function deleteNode(id) {
  const g = currentGraph();
  if (!g) return;
  delete g.nodes[id];
  g.edges = g.edges.filter(e => e.from!==id && e.to!==id);
  selectedNode = null;
  document.getElementById('deleteNodeBtn').style.display = 'none';
  applyFlowchartLayout();
  saveGraphs();
  updateScoreBar();
}

function deleteEdge(e) {
  const g = currentGraph();
  if (!g) return;
  g.edges = g.edges.filter(x => !(x.from===e.from && x.to===e.to));
  selectedEdge = null;
  applyFlowchartLayout();
  saveGraphs();
  updateScoreBar();
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•ҒE// NODE SHEET
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•ҒEfunction openNodeSheet(id, isNew=false) {
  editingNodeId = id;
  const g = currentGraph();
  const n = g?.nodes[id];
  if (!n) return;
  ensurePhysicsFields(n);

  document.getElementById('nodeSheetTitle').textContent = isNew ? 'ж–°иҰҸгғҺгғјгғҒE : 'гғҺгҒEгғүз·ЁйӣҒE;
  document.getElementById('nLabel').value = n.label || '';
  document.getElementById('nMemo').value = n.memo || '';
  const slider = document.getElementById('nWeight');
  slider.value = n.weight || 3;
  document.getElementById('nWeightVal').textContent = n.weight || 3;
  updateSliderPct(slider);

  editingNodeColor = n.color || '#4A9EFF';
  document.querySelectorAll('.color-swatch').forEach(sw => {
    sw.classList.toggle('active', sw.dataset.color === editingNodeColor);
  });

  // гӮЁгғҒEӮёжғҒE ұ
  const inEdges  = g.edges.filter(e => e.to===id);
  const outEdges = g.edges.filter(e => e.from===id);
  const edgeLines = [];
  inEdges.forEach(e  => edgeLines.push(`вҶҒE${g.nodes[e.from]?.label||'?'} (ГҒE{e.weight||1})`));
  outEdges.forEach(e => edgeLines.push(`вҶҒE${g.nodes[e.to]?.label||'?'} (ГҒE{e.weight||1})`));
  document.getElementById('edgeInfo').textContent = edgeLines.join('\n') || 'гҒӘгҒҒE;

  // зү©зҗҒEұӨгӮ№гғҒEҒEгӮҝгӮ№иЎЁзӨә
  const band = estimateFreqBand(n);
  const bandLabel = band ? BAND_STYLE[band].label : 'жңӘзҷәзҒ«';
  const cluster = currentSyncClusters.find(c => c.nodeIds.includes(id));
  const attr = cluster ? classifyAttractor(cluster) : null;
  document.getElementById('physicsBox').innerHTML =
    `йӣ»иҚ·йҮҒE <b>${Math.round(n.charge*100)}%</b>гҖҖзҷәзҒ«еӣһж•°: <b>${n.fireHistory.length}</b><br>` +
    `жҺЁе®ҡеёҜеҹҒE <b>${bandLabel}</b><br>` +
    `еҗҢжңҹattractor: <b>${attr ? attr.label : 'жңӘеҸҺжқҹ'}</b>`;

  openSheet('nodeSheet');
  setTimeout(() => {
    if (isNew) document.getElementById('nLabel').select();
  }, 300);
}

function saveNodeSheet() {
  const g = currentGraph();
  const n = g?.nodes[editingNodeId];
  if (!n) return;
  n.label  = document.getElementById('nLabel').value.trim() || '?';
  n.memo   = document.getElementById('nMemo').value;
  n.weight = parseInt(document.getElementById('nWeight').value);
  n.color  = editingNodeColor;
  saveGraphs();
  updateScoreBar();
  closeSheet('nodeSheet');
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•ҒE// EDGE HINT
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•ҒEfunction showEdgeHint(e) {
  const g = currentGraph();
  const label = `${g?.nodes[e.from]?.label||'?'} вҶҒE${g?.nodes[e.to]?.label||'?'} (ГҒE{e.weight||1}) гӮ’еүҠйҷӨгҒ—гҒҫгҒҷгҒӢҒEҹ`;
  document.getElementById('edgeHintLabel').textContent = label;
  document.getElementById('edgeHint').classList.add('show');
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•ҒE// GRAPH LIST
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•ҒEfunction renderGraphList() {
  const wrap = document.getElementById('graphListWrap');
  const ids = Object.keys(graphs).sort((a,b) => (graphs[b].createdAt||0)-(graphs[a].createdAt||0));
  wrap.innerHTML = ids.map(id => {
    const g = graphs[id];
    const nodeCount = Object.keys(g.nodes||{}).length;
    const isCur = id === currentGraphId;
    return `<div class="graph-item ${isCur?'current':''}" data-id="${id}">
      <div>
        <div class="graph-item-name">${escHtml(g.name)}${isCur?' вңҒE:''}</div>
        <div class="graph-item-meta">гғҺгҒEгғҒE${nodeCount}еҖҒE/div>
      </div>
      <button class="graph-item-del" data-del="${id}">рҹ—‘</button>
    </div>`;
  }).join('') || '<div style="text-align:center;color:var(--text-dim);padding:30px;">гӮ°гғ©гғ•гҒҢгҒӮгӮҠгҒҫгҒӣгӮ“</div>';

  wrap.querySelectorAll('.graph-item[data-id]').forEach(el => {
    el.addEventListener('click', ev => {
      if (ev.target.dataset.del) return;
      switchGraph(el.dataset.id);
      closeSheet('graphsSheet');
    });
  });
  wrap.querySelectorAll('[data-del]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = btn.dataset.del;
      if (!confirm(`гҖҒE{graphs[id]?.name}гҖҚгӮ’еүҠйҷӨгҒ—гҒҫгҒҷгҒӢҒEҹ`)) return;
      delete graphs[id];
      if (currentGraphId === id) {
        const remaining = Object.keys(graphs);
        if (remaining.length === 0) createGraph('гӮ°гғ©гғҒE');
        else switchGraph(remaining[0]);
      }
      saveGraphs();
      renderGraphList();
    });
  });
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•ҒE// is_transfer йҖЈжҗә
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•ҒE// гӮўгӮӨгғҒEғ 1д»¶гӮ’гҖҒж„ҹжғҒEғЎгӮҝгғҒEҒEгӮҝгҒҢгҒӮгӮҢгҒEгҒқгӮҢгӮ’еҸҚжҳ гҒ—гҒҹгғҺгҒEгғүгҒЁгҒ—гҒҰиҝҪеҠ гҒҷгӮӢе…ұйҖҡеҒEзҗҒEfunction addNodeFromTransferItem(item, index, total, g) {
  const angle = (index / total) * Math.PI * 2;
  const dist = 200 + Math.random() * 100;
  const id = item.id || uid();
  if (g.nodes[id]) return null;

  const meta = item._emotionMeta || null;
  const band = meta?.band || meta?.textBand || meta?.fmBand || null;
  const bandStyle = band ? BAND_STYLE[band] : null;
  const cols = ['#4A9EFF','#4AE09A','#F5C842','#C084FC','#FB923C','#FF5F5F'];

  g.nodes[id] = {
    id,
    label: (item.title || 'з„ЎйЎҒE).slice(0,20),
    memo: (item.body || '').replace(/<[^>]+>/g,'').slice(0,200),
    weight: 3,
    // ж„ҹжғ…гғЎгӮҝгҒҢгҒӮгӮҢгҒEгҒқгҒEеёҜеҹҹгҒEиүІгӮ’дҪҝгҒҒEҖӮгҒӘгҒ‘гӮҢгҒ°еҫ“жқҘйҖҡгӮҠиҷ№иүІгӮ’еүІгӮҠеҪ“гҒҰгҖҒE    color: bandStyle ? bandStyle.color : cols[index % cols.length],
    x: Math.cos(angle) * dist,
    y: Math.sin(angle) * dist,
    charge: 0,
    fireHistory: [],
    lastFired: 0,
    sourceApp: item._emotionMeta ? (item.source || null) : undefined,
    emotionBand: band || undefined,
  };
  return id;
}

function importFromTransfer() {
  try {
    const raw = localStorage.getItem(LS_TRANSFER);
    if (!raw) { showToast('is_transferгҒ«гғҒEҒEгӮҝгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“'); return; }
    const payload = JSON.parse(raw);
    const items = payload.items || (Array.isArray(payload) ? payload : null);
    if (!items || items.length === 0) { showToast('гӮӨгғігғқгҒEгғҲгҒ§гҒҚгӮӢгғҒEҒEгӮҝгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“'); return; }

    const g = currentGraph();
    if (!g) return;

    let added = 0;
    items.forEach((item, i) => {
      const id = addNodeFromTransferItem(item, i, items.length, g);
      if (id) { added++; fireNode(id); }
    });
    applyFlowchartLayout();
    saveGraphs();
    updateScoreBar();
    centerView();
    closeSheet('graphsSheet');
    showToast(`${added}д»¶гҒ®гғҺгҒEгғүгӮ’иҝҪеҠ гҒ—гҒҫгҒ—гҒҹ`);
  } catch(e) {
    console.error(e);
    showToast('гӮӨгғігғқгҒEгғҲгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹ');
  }
}

// в”Җв”Җ гғ–гғӘгғҒEӮёгҒӢгӮүгҒ®иҮӘеӢ•йҖҒдҝЎ(is_emotion_transfer)гӮ’йқҷгҒӢгҒ«еҸ–гӮҠиҫјгӮҖ в”Җв”Җ
// quick-ref-bridgeзӯүгҒҢдҝқеӯҳгҒEгҒҹгҒEгҒ«жӣёгҒҚиҫјгӮҖ1д»¶гғҒEҒEгӮҝгӮ’гҖҒзўәиӘҚгҒӘгҒ—гҒ§
// еӣ жһңгӮ°гғ©гғ•гҒ«иҮӘеӢ•иҝҪеҠ гҒҷгӮӢгҖӮж—ўгҒ«еҸ–гӮҠиҫјгӮ“гҒ гӮҝгӮӨгғ гӮ№гӮҝгғігғ—гҒEиЁҳйҢІгҒ—гҒҰйҮҚиӨҒEҳІжӯўгҖҒElet lastEmotionTransferTs = Number(localStorage.getItem('fm_last_emotion_ts') || 0);

function checkEmotionTransfer() {
  try {
    const raw = localStorage.getItem(LS_EMOTION_TRANSFER);
    if (!raw) return;
    const payload = JSON.parse(raw);
    if (!payload.timestamp || payload.timestamp <= lastEmotionTransferTs) return;
    if (payload.source === 'flow-mind') return; // иҮӘеҲҒEҒEиә«гҒ®жӣёгҒҚиҫјгҒҝгҒҜз„ЎиҰҒE    const items = payload.items;
    if (!Array.isArray(items) || items.length === 0) return;

    const g = currentGraph();
    if (!g) return;

    let added = 0, lastId = null;
    items.forEach((item, i) => {
      // иҮӘеӢ•еҸ—дҝЎгҒ§гҒҜitemгҒ«_emotionMetaгҒҢз„ЎгҒҒEҒ“гҒЁгҒҢгҒӮгӮӢгҒEгҒ§гҖҒгҒEгӮӨгғӯгғјгғүеҒEдҪ“гҒEemotionMetaгҒ§иЈңгҒҶ
      const merged = item._emotionMeta ? item : { ...item, _emotionMeta: payload.emotionMeta };
      const id = addNodeFromTransferItem(merged, i, items.length, g);
      if (id) { added++; lastId = id; }
    });
    if (added > 0) {
      applyFlowchartLayout();
      saveGraphs();
      updateScoreBar();
      if (lastId) fireNode(lastId);
      showToast(`${payload.source || 'д»–гӮўгғ—гғӘ'}гҒӢгӮү${added}д»¶гӮ’еҸ—дҝЎгҒ—гҒҫгҒ—гҒҹ`);
    }
    lastEmotionTransferTs = payload.timestamp;
    localStorage.setItem('fm_last_emotion_ts', String(lastEmotionTransferTs));
  } catch(e) {
    console.warn('checkEmotionTransfer error', e);
  }
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•ҒE// #import= URL HASH
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•ҒEfunction checkImportHash() {
  if (!location.hash.startsWith('#import=')) return;
  try {
    const b64 = location.hash.slice(8);
    const json = decodeURIComponent(escape(atob(b64)));
    const payload = JSON.parse(json);
    const name = payload.graphName || `гӮӨгғігғқгҒEгғҒE${new Date().toLocaleDateString()}`;
    const newId = createGraph(name);
    const g = graphs[newId];
    if (payload.nodes) g.nodes = payload.nodes;
    if (payload.edges) g.edges = payload.edges;
    applyFlowchartLayout();
    saveGraphs();
    switchGraph(newId);
    showToast(`гӮ°гғ©гғ•гҖҒE{name}гҖҚгӮ’гӮӨгғігғқгҒEгғҲгҒ—гҒҫгҒ—гҒҹ`);
  } catch(e) { console.warn('hash import error', e); }
  finally { history.replaceState(null,'',location.pathname); }
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•ҒE// AI LAYER
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•ҒEasync function callAI(prompt) {
  const modelKey = localStorage.getItem(LS_MODEL) || 'claude';
  const proxyUrl = localStorage.getItem(LS_PROXY) || '';
  const m = MODELS[modelKey] || MODELS.claude;
  const keyMap = { claude:LS_CLAUDE, gemini:LS_GEMINI, openai:LS_OPENAI };
  const apiKey = localStorage.getItem(keyMap[modelKey]) || '';

  if (!apiKey && !proxyUrl) throw new Error(`APIгӮӯгғјгҒҢжңӘиЁӯе®ҡгҒ§гҒҷгҖӮquick-refгҒ®вҡҷпёҸиЁӯе®ҡгҒӢгӮүеҒEеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„ҒEҒE{m.label}ҒEү`);

  if (proxyUrl) {
    const res = await fetch(proxyUrl, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model:modelKey, prompt }),
    });
    if (!res.ok) throw new Error(`Proxy error: ${res.status}`);
    const d = await res.json();
    return d.text || d.content || JSON.stringify(d);
  }

  if (modelKey === 'claude') {
    const res = await fetch(m.endpoint, {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,
        'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({ model:m.model, max_tokens:1024,
        messages:[{role:'user',content:prompt}] }),
    });
    const d = await res.json();
    if (!res.ok) throw new Error(d.error?.message || `Claude ${res.status}`);
    return d.content?.[0]?.text || '';
  }
  if (modelKey === 'gemini') {
    const res = await fetch(`${m.endpoint}?key=${apiKey}`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ contents:[{parts:[{text:prompt}]}],
        generationConfig:{maxOutputTokens:1024} }),
    });
    const d = await res.json();
    if (!res.ok) throw new Error(d.error?.message || `Gemini ${res.status}`);
    return d.candidates?.[0]?.content?.parts?.[0]?.text || '';
  }
  if (modelKey === 'openai') {
    const res = await fetch(m.endpoint, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},
      body: JSON.stringify({ model:m.model, max_tokens:1024,
        messages:[{role:'user',content:prompt}] }),
    });
    const d = await res.json();
    if (!res.ok) throw new Error(d.error?.message || `OpenAI ${res.status}`);
    return d.choices?.[0]?.message?.content || '';
  }
  throw new Error('жңӘеҜҫеҝңгҒEгғўгғҒEғ«');
}

function buildGraphDescription() {
  const g = currentGraph();
  if (!g) return '';
  const scores = computeScores();
  const nodeLines = Object.entries(g.nodes)
    .sort((a,b) => (scores[b[0]]||0)-(scores[a[0]]||0))
    .map(([id,n]) => `гғ»${n.label}ҒEҲиҒEе·ұйҮҚгҒҝ:${n.weight}гҖҒEҮҚиҰҒеәҰгӮ№гӮігӮў:${Math.round((scores[id]||0)*100)}%ҒEҒE{n.memo?` вҶҒE${n.memo}`:''}`);
  const edgeLines = g.edges.map(e =>
    `${g.nodes[e.from]?.label||'?'} вҶ’[ГҒE{e.weight||1}]вҶҒE${g.nodes[e.to]?.label||'?'}`);
  return `гӮ°гғ©гғ•еҗҚҒEҒE{g.name}\n\nгҖҗгғҺгғјгғүгҖ‘\n${nodeLines.join('\n')}\n\nгҖҗеӣ жһңгӮЁгғҒEӮёгҖ‘\n${edgeLines.join('\n')||'гҒӘгҒҒE}`;
}

// в‘Ј еҗҢжңҹгӮҜгғ©гӮ№гӮҝҒEқattractorжғҒE ұгӮ’ж§ӢйҖ еҢ–гҒ—гҒҰAIгҒ«жёЎгҒҷпјҲжң¬йҹіжҠҪеҮәз”ЁгӮігғігғҒEӮӯгӮ№гғҲпјҒEfunction buildAttractorContext() {
  const g = currentGraph();
  if (!g || currentSyncClusters.length === 0) {
    return 'зҸҫеңЁгҖҒеҗҢжңҹгҒ—гҒҰгҒҒEӮӢҒEҲжҙ»жҖ§еҢ–гҒ—гҒҰгҒҒEӮӢҒEүгғҺгғјгғүзҫӨгҒҜгҒӮгӮҠгҒҫгҒӣгӮ“гҖҒE;
  }
  const lines = currentSyncClusters.map(c => {
    const attr = classifyAttractor(c);
    const style = BAND_STYLE[c.band];
    const nodeLabels = c.nodeIds.map(id => g.nodes[id]?.label || '?').join('гҖҒE);
    return `гғ»еёҜеҹҒE${style.label}ҒEҸжҢҒз¶ҒE${Math.round(c.durationMs)}msҒEҸеҜҒEәҰ:${Math.round(c.density*100)}%\n` +
      `  й–ўдёҺгғҺгғјгғҒE ${nodeLabels}\n` +
      `  жҺЁе®ҡattractor: ${attr ? attr.label : 'жңӘеҸҺжқҹҒEҲйҒҺжёЎзҠ¶ж…ӢпјҒE}`;
  });
  return `зҸҫеңЁгҖҒд»ҘдёӢгҒEзҘһзөҢеҗҢжңҹгғ‘гӮҝгғјгғіҒEҲйӣ»ж°—жҢҜеӢ•гҒEгӮҜгғ©гӮ№гӮҝҒEүгҒҢжӨңеҒEгҒ•гӮҢгҒҰгҒҒEҒҫгҒҷпјҡ\n${lines.join('\n\n')}`;
}

async function runAnalysis(type, custom='') {
  const desc = buildGraphDescription();
  if (!desc.includes('гғҺгҒEгғҒE)) { showToast('гғҺгҒEгғүгӮ’иҝҪеҠ гҒ—гҒҰгҒӢгӮүеҲҒEһҗгҒ—гҒҰгҒҸгҒ гҒ•гҒ„'); return; }

  const attractorCtx = buildAttractorContext();

  const prompts = {
    structure: `д»ҘдёӢгҒEеӣ жһңгӮ°гғ©гғ•гӮ’еҲҒEһҗгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖҒEnжңҖйҮҚиҰҒгғҺгғјгғүпјҲеҪұйҹҝеҠӣгҒҢеӨ§гҒҚгҒ„гӮӮгҒEҒEүгҒEзҗҒE”ұгҖҒж§ӢйҖ зҡҒEҒӘзү№еҫҙгҖҒж”№е–ҒEҸҗжЎҲгӮ’ж—Ҙжң¬иӘһгҒ§ж•ҷгҒҲгҒҰгҒҸгҒ гҒ•гҒ„гҖҒEn\n${desc}`,
    weak: `д»ҘдёӢгҒEеӣ жһңгӮ°гғ©гғ•гҒEејұзӮ№гӮ’жӨңеҒEгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖҒEnеӯӨз«ӢгҒ—гҒҹгғҺгғјгғүгҖҒж №жӢ гҒ®и–ҒEҒ„з№ӢгҒҢгӮҠгҖҒи«–зҗҶзҡҒEҒӘйЈӣиәҚгҖҒиҰӢиҗҪгҒЁгҒ•гӮҢгҒҰгҒҒEӮӢй–ўдҝӮжҖ§гӮ’ж—Ҙжң¬иӘһгҒ§жҢҒE‘ҳгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖҒEn\n${desc}`,
    suggest: `д»ҘдёӢгҒEеӣ жһңгӮ°гғ©гғ•гӮ’иҰӢгҒҰгҖҒиҝҪеҠ гҒҷгҒ№гҒҚгғҺгғјгғүпјҲжҰӮеҝөгғ»гӮўгӮӨгғҒEӮўҒEүгӮ’5гҒӨжҸҗжЎҲгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖҒEnеҗҒEҸҗжЎҲгҒ«гҖҒж—ўеӯҳгҒEгҒ©гҒ®гғҺгҒEгғүгҒЁз№ӢгҒҢгӮӢгҒӢгӮӮзӨәгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮж—Ҙжң¬иӘһгҒ§гҖҒEn\n${desc}`,
    honne: `гҒӮгҒӘгҒҹгҒEгҖҢж„ҹжғҒEҒEзү©зҗҒEғўгғҒEғ«гҖҚгҒ«еҹәгҒҘгҒҒEҒҰжң¬йҹігӮ’жҠҪеҮәгҒҷгӮӢгӮўгӮ·гӮ№гӮҝгғігғҲгҒ§гҒҷгҖҒEn` +
      `ж„ҹжғ…гҒЁгҒҜгҖҒзҘһзөҢгғҚгғҒEғҲгғҜгғјгӮҜгҒ®зү№е®ҡгҒEе‘Ёжіўж•°еёҜгҒ§гҒ®еҗҢжңҹҒEҲгӮігғ’гҒEгғ¬гғігӮ№ҒEүгҒҢгҖҒе®үе®ҡгҒ—гҒҹзҠ¶ж…ӢпјҒEttractorҒEүгҒ«еҸҺжқҹгҒ—гҒҹгҒЁгҒҚгҒEдё»иҰізҡҒEҪ“йЁ“гҒ гҒЁиҖҒEҒҲгҒҫгҒҷгҖҒEn\n` +
      `${attractorCtx}\n\n` +
      `д»ҘдёӢгҒEгҒ“гҒEгғҰгғјгӮ¶гғјгҒ®жҖқиҖҒEӮ°гғ©гғ•гҒ§гҒҷпјҡ\n${desc}\n\n` +
      `дёҠиЁҳгҒEеҗҢжңҹгғ‘гӮҝгғјгғіҒEҲзү№гҒ«ОіжіўҒEқжҖ’гӮҠгғ»йӣҒEёӯгҖҒОёжіўҒEқдёҚе®үгҖҒОҙжіўҒEқж·ұгҒҒEғ…еӢ•пјүгҒҢгҖҒ` +
      `гҒ©гҒ®гғҺгҒEгғүзҫӨгӮ’дёӯеҝҒEҒ«иө·гҒҚгҒҰгҒҒEӮӢгҒӢгҒ«жіЁзӣ®гҒ—гҖҒгғҰгғјгӮ¶гғјиҮӘиә«гӮӮгҒҫгҒ иЁҖиӘһеҢ–гҒ§гҒҚгҒҰгҒҒEҒӘгҒҒEҖҢжң¬йҹігҖҚгӮ’ж–ӯе®ҡгҒӣгҒҡд»®иӘ¬гҒЁгҒ—гҒҰ1гҖҒEеҖӢгҖҒж—Ҙжң¬иӘһгҒ§жҸҗзӨәгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ` +
      `ж №жӢ гҒЁгҒ—гҒҰгҖҒгҒ©гҒ®еҗҢжңҹгӮҜгғ©гӮ№гӮҝгғ»гҒ©гҒ®гғҺгҒEгғүгҒEзөҒEҒҝеҗҲгӮҸгҒӣгҒӢгӮүгҒқгҒ®д»®иӘ¬гӮ’е°ҺгҒ„гҒҹгҒӢгӮӮжҒEиЁҳгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ`,
  };

  const prompt = custom
    ? `${custom}\n\n---\n${attractorCtx}\n\n${desc}`
    : prompts[type];
  const box = document.getElementById('aiResultBox');
  box.classList.remove('visible');
  document.getElementById('aiLoading').classList.add('show');

  try {
    const result = await callAI(prompt);
    box.textContent = result;
    box.classList.add('visible');
  } catch(e) {
    showToast(e.message);
  } finally {
    document.getElementById('aiLoading').classList.remove('show');
  }
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•ҒE// QUICK CAPTURE вҖҒEгҒҷгҒҗиЁҳйҢІҒEҲйҹіеЈ° / гғҒEӮӯгӮ№гғҒE/ е…ұжңүгӮ·гғјгғҲиө·еӢ•пјҒE// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•ҒElet qcRecorder = null;
let qcChunks = [];
let qcRecording = false;

function openQuickCapture(prefillText) {
  document.getElementById('quickCaptureBar').classList.add('open');
  const input = document.getElementById('qcInput');
  if (typeof prefillText === 'string') input.value = prefillText;
  setQcStatus('');

}

function closeQuickCapture() {
  document.getElementById('quickCaptureBar').classList.remove('open');
  if (qcRecording) stopQcRecording();
}

function autoGrowQc() {
  const el = document.getElementById('qcInput');
  el.style.height = 'auto';
  el.style.height = Math.min(120, el.scrollHeight) + 'px';
}

function setQcStatus(msg, busy) {
  const el = document.getElementById('qcStatus');
  el.textContent = msg || '';
  el.classList.toggle('busy', !!busy);
}

// гғҒEӮӯгӮ№гғҲгҒӢгӮүгғҺгғјгғүгӮ’еҚіжҷӮдҪңжҒEгҒ—гҖҒзӣҙеүҚгҒ«зҷәзҒ«гҒ—гҒҹгғҺгҒEгғүгҒёеӣ жһңгӮЁгғҒEӮёгҒ§жҺҘз¶ҡгҒҷгӮҒE// ҒEҲпјқеӯӨз«ӢгғҺгғјгғүгҒ«гҒӣгҒҡгҖҒж—ўеӯҳгҒEжҖқиҖҒEӮ°гғ©гғ•гҒEдёӯгҒ«дҪҚзҪ®гҒҘгҒ‘гӮӢҒEҒEfunction quickAddNode(text) {
  const g = currentGraph();
  if (!g) return;
  const trimmed = text.trim();
  if (!trimmed) { showToast('еҶҒE®№гӮ’еҒEеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„'); return; }

  const connectSourceId = (lastFiredNodeId && g.nodes[lastFiredNodeId]) ? lastFiredNodeId : null;
  const basePos = connectSourceId
    ? { x: g.nodes[connectSourceId].x, y: g.nodes[connectSourceId].y }
    : screenToWorld(canvas.width/2, canvas.height/2);
  const angle = Math.random() * Math.PI * 2;
  const dist = 130 + Math.random() * 40;
  const pos = { x: basePos.x + Math.cos(angle)*dist, y: basePos.y + Math.sin(angle)*dist };

  const id = uid();
  const firstLine = trimmed.split('\n')[0].slice(0, 18);
  g.nodes[id] = {
    id,
    label: firstLine || 'иЁҳйҢІ',
    memo: trimmed,                // е…Ёж–ҒEӮ’еҝҒEҒҡгғЎгғўгҒ«дҝқжҢҒҒEҲзңҒз•ҘгҒ—гҒӘгҒҒEјҒE    x: pos.x, y: pos.y,
    weight: 3,
    color: '#4A9EFF',
    charge: 0,
    fireHistory: [],
    lastFired: 0,
  };

  // зӣҙеүҚгҒ«зҷәзҒ«гҒ—гҒҹгғҺгҒEгғүгҒҢгҒӮгӮҢгҒ°гҖҒеӣ жһңгҒEйҖЈйҺ–гҒЁгҒ—гҒҰиҮӘеӢ•жҺҘз¶ҒE  if (connectSourceId) {
    g.edges.push({ from: connectSourceId, to: id, weight: 1, conductance: 1.0 });
  }

  applyFlowchartLayout();
  saveGraphs();
  updateScoreBar();
  closeQuickCapture();
  fireNode(id);                   // зҷәзҒ«гҒ•гҒӣгҒҰйӣ»иҚ·гғ»еҗҢжңҹжіўгӮ’дјқж’ӯгҒ•гҒӣгӮҒE  document.getElementById('qcInput').value = '';
  autoGrowQc();

  // е…Ёж–ҒEҒEжҺҘз¶ҡгӮ’зўәиӘҚгҒ§гҒҚгӮӢгӮҲгҒҶгҖҒгғҺгғјгғүз·ЁйӣҒEӮ·гғјгғҲгӮ’иҮӘеӢ•гҒ§й–ӢгҒҸ
  openNodeSheet(id, true);
  showToast(connectSourceId ? 'иЁҳйҢІгҒ—гҒҰжҺҘз¶ҡгҒ—гҒҫгҒ—гҒҹ' : 'иЁҳйҢІгҒ—гҒҫгҒ—гҒҹ');
}

// в”Җв”Җ йҹіеЈ°е…ҘеҠӣпјҒEediaRecorderгҒ§йҢІйҹі вҶҒEAI(Whisperзі»)гҒ§ж–ҒEӯ—иө·гҒ“гҒ—ҒEүв”Җв”Җ
// иЈңи¶іҒEҡiOS SafariгҒҜгғ–гғ©гӮҰгӮ¶жЁҷжә–гҒEйҹіеЈ°иӘҚиӯҒESpeechRecognition)гҒ«еҜҫеҝңгҒ—гҒҰгҒҒEҒӘгҒҒEҒҹгӮҒгҖҒE// йҢІйҹігҒ—гҒҰAI APIгҒ«йҖҒгҒЈгҒҰж–ҒEӯ—иө·гҒ“гҒ—гҒҷгӮӢж–№ејҸгҒ«гҒ—гҒҰгҒҒEҒҫгҒҷгҖҒEfunction startQcRecording() {
  if (qcRecording) return;
  if (!window.isSecureContext) {
    showToast('гғһгӮӨгӮҜгҒҜhttpsз’°еўҒEҒ§гҒ®гҒҝдҪҝз”ЁгҒ§гҒҚгҒҫгҒҒE);
    return;
  }
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showToast('гҒ“гҒEгғ–гғ©гӮҰгӮ¶/иЎЁзӨәгғўгғјгғүгҒEйҢІйҹігҒ«еҜҫеҝңгҒ—гҒҰгҒҒEҒҫгҒӣгӮ“');
    return;
  }
  if (typeof MediaRecorder === 'undefined') {
    showToast('гҒ“гҒEз’°еўҒEҒEMediaRecorderгҒ«еҜҫеҝңгҒ—гҒҰгҒҒEҒҫгҒӣгӮ“');
    return;
  }
  navigator.mediaDevices.getUserMedia({ audio:true }).then(stream => {
    qcChunks = [];
    const mimeType = MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4'
      : (MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : '');
    try {
      qcRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
    } catch (recErr) {
      console.error(recErr);
      showToast('йҢІйҹігҒ®еҲқжңҹеҢ–гҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹ: ' + recErr.message);
      stream.getTracks().forEach(t => t.stop());
      return;
    }
    qcRecorder.ondataavailable = e => { if (e.data.size > 0) qcChunks.push(e.data); };
    qcRecorder.onerror = e => {
      console.error('MediaRecorder error', e.error);
      showToast('йҢІйҹігӮЁгғ©гғј: ' + (e.error?.message || e.error?.name || 'дёҚжҒEгҒӘгӮЁгғ©гғј'));
    };
    qcRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      if (qcChunks.length === 0) { setQcStatus(''); showToast('йҢІйҹігғҒEҒEгӮҝгҒҢеҸ–еҫ—гҒ§гҒҚгҒҫгҒӣгӮ“гҒ§гҒ—гҒҹ'); return; }
      const blob = new Blob(qcChunks, { type: qcRecorder.mimeType || 'audio/webm' });
      transcribeAndFill(blob);
    };
    qcRecorder.start();
    qcRecording = true;
    document.getElementById('qcMicBtn').classList.add('recording');
    document.getElementById('quickCaptureFab').classList.add('recording');
    setQcStatus('рҹҺҷ йҢІйҹідёӯвҖҰгӮӮгҒҶдёҖеәҰгӮҝгғҒEҒEгҒ§ж–ҒEӯ—иө·гҒ“гҒ—', true);
  }).catch(err => {
    console.error(err);
    // iOSгҒ§гӮҲгҒҸгҒӮгӮӢеҺҹеӣ гӮ’еҲӨеҲҘгҒ—гҒҰгғЎгғҒEӮ»гғјгӮёгӮ’еҒEгҒ—еҒEгҒ‘гӮӢ
    let msg = 'гғһгӮӨгӮҜгҒёгҒ®гӮўгӮҜгӮ»гӮ№гҒҢеҝҒEҰҒгҒ§гҒҒE;
    if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
      msg = 'гғһгӮӨгӮҜгҒёгҒ®гӮўгӮҜгӮ»гӮ№гҒҢжӢ’еҗҰгҒ•гӮҢгҒҰгҒҒEҒҫгҒҷгҖӮиЁӯе®ҒE> Safari(гҒҫгҒҹгҒEгҒ“гҒEгӮўгғ—гғӘ) > гғһгӮӨгӮҜ гӮ’зўәиӘҚгҒ—гҒҰгҒҸгҒ гҒ•гҒ„';
    } else if (err.name === 'NotFoundError') {
      msg = 'гғһгӮӨгӮҜгҒҢиҰӢгҒӨгҒӢгӮҠгҒҫгҒӣгӮ“';
    } else if (err.name === 'NotReadableError') {
      msg = 'д»–гҒEгӮўгғ—гғӘгҒҢгҒEгӮӨгӮҜгӮ’дҪҝз”ЁдёӯгҒ®еҸҜиғҪжҖ§гҒҢгҒӮгӮҠгҒҫгҒҒE;
    } else if (err.name === 'SecurityError') {
      msg = 'гӮ»гӮӯгғҘгғӘгғҒEӮЈеҲ¶йҷҗгҒ«гӮҲгӮҠгғһгӮӨгӮҜгӮ’дҪҝз”ЁгҒ§гҒҚгҒҫгҒӣгӮ“(httpsз’°еўҒEҒӢзўәиӘҚгҒ—гҒҰгҒҸгҒ гҒ•гҒ„)';
    }
    showToast(msg + `ҒEҒE{err.name}ҒEү`);
  });
}

function stopQcRecording() {
  if (!qcRecording || !qcRecorder) return;
  qcRecording = false;
  document.getElementById('qcMicBtn').classList.remove('recording');
  document.getElementById('quickCaptureFab').classList.remove('recording');
  if (qcRecorder.state !== 'inactive') qcRecorder.stop();
}

async function transcribeAndFill(blob) {
  setQcStatus('вҸі ж–ҒEӯ—иө·гҒ“гҒ—дёӯвҖҰ', true);
  const apiKey = localStorage.getItem(LS_OPENAI) || '';
  const proxyUrl = localStorage.getItem(LS_PROXY) || '';
  if (!apiKey && !proxyUrl) {
    setQcStatus('');
    showToast('ж–ҒEӯ—иө·гҒ“гҒ—гҒ«гҒҜOpenAI APIгӮӯгғјгҒҢеҝҒEҰҒгҒ§гҒҷпјҒEuick-refгҒ®вҡҷпёҸиЁӯе®ҡпјҒE);
    return;
  }
  try {
    let text = '';
    if (proxyUrl) {
      const form = new FormData();
      form.append('file', blob, 'audio.' + (blob.type.includes('mp4') ? 'mp4' : 'webm'));
      form.append('purpose', 'transcription');
      const res = await fetch(proxyUrl.replace(/\/$/, '') + '/transcribe', { method:'POST', body: form });
      if (!res.ok) throw new Error(`Proxy transcribe error: ${res.status}`);
      const d = await res.json();
      text = d.text || '';
    } else {
      const form = new FormData();
      form.append('file', blob, 'audio.' + (blob.type.includes('mp4') ? 'mp4' : 'webm'));
      form.append('model', 'whisper-1');
      form.append('language', 'ja');
      const res = await fetch('https://api.openai.com/v1/audio/transcriptions', {
        method:'POST',
        headers: { 'Authorization': `Bearer ${apiKey}` },
        body: form,
      });
      const d = await res.json();
      if (!res.ok) throw new Error(d.error?.message || `Whisper ${res.status}`);
      text = d.text || '';
    }
    const input = document.getElementById('qcInput');
    input.value = (input.value ? input.value + '\n' : '') + text.trim();
    autoGrowQc();
    setQcStatus('');
  } catch(e) {
    console.error(e);
    setQcStatus('');
    showToast('ж–ҒEӯ—иө·гҒ“гҒ—гҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹ: ' + e.message);
  }
}

// в”Җв”Җ URLзөҢз”ұгҒ®еҚіиЁҳйҢІеҸ—дҝЎ в”Җв”Җ
// index.html#capture=<encodeURIComponent(text)> гҒ§й–ӢгҒҸгҒЁгҖҒгҒҷгҒҗиЁҳйҢІгғҗгҒEгҒ«гғҒEӮӯгӮ№гғҲгҒҢе…ҘгҒЈгҒҹзҠ¶ж…ӢгҒ§иө·еӢ•гҒҷгӮӢгҖҒE// &auto=1 гӮ’д»ҳгҒ‘гӮӢгҒЁгғҗгҒEгӮ’й–ӢгҒӢгҒҡгҒқгҒEгҒҫгҒҫгғҺгҒEгғүеҢ–гҒҷгӮӢҒEҲдҫӢпјҡiOSгӮ·гғ§гғјгғҲгӮ«гғҒEғҲгҒ®гҖҢеҒEжңүгҖҚгӮўгӮҜгӮ·гғ§гғігҒӢгӮүҒEүгҖҒEfunction checkCaptureHash() {
  if (!location.hash.startsWith('#capture=')) return;
  try {
    const raw = location.hash.slice('#capture='.length);
    const [encoded, ...rest] = raw.split('&');
    const text = decodeURIComponent(encoded);
    const auto = rest.includes('auto=1');
    if (auto && text.trim()) {
      quickAddNode(text);
    } else {
      openQuickCapture(text);
    }
  } catch(e) { console.warn('capture hash parse error', e); }
  finally { history.replaceState(null, '', location.pathname); }
}

function wireQuickCapture() {
  const fab = document.getElementById('quickCaptureFab');
  const bar = document.getElementById('quickCaptureBar');
  const input = document.getElementById('qcInput');
  const micBtn = document.getElementById('qcMicBtn');
  const sendBtn = document.getElementById('qcSendBtn');

  closeBtn.addEventListener('click', closeQuickCapture);

  input.addEventListener('input', autoGrowQc);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      quickAddNode(input.value);
    }
  });

  micBtn.addEventListener('click', () => {
    if (qcRecording) stopQcRecording();
    else startQcRecording();
  });

  sendBtn.addEventListener('click', () => quickAddNode(input.value));
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•ҒEasync function checkCloudSyncOnLoad() {
